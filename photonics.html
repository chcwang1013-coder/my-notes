<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光子積體電路 · 互動知識庫</title>
<style>
  :root{
    --bg:#eef6f9; --bg2:#ffffff; --panel:#ffffff; --panel2:#f1f8fb;
    --line:#d5e5ec; --text:#123039; --muted:#4d6b76; --dim:#8aa4ae;
    --cyan:#0891b2; --green:#059669; --amber:#d97706; --purple:#7c3aed; --pink:#e11d48;
    --accent:#0e9bc4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:
      radial-gradient(1100px 420px at 50% -120px, rgba(14,155,196,.14), transparent 70%),
      linear-gradient(180deg,#f6fbfd 0%,#e9f3f7 100%);
    color:var(--text);font-family:'PingFang TC','Microsoft JhengHei','Helvetica Neue',system-ui,sans-serif;
    line-height:1.75;overflow:hidden}
  header{position:fixed;top:0;left:0;right:0;height:60px;z-index:20;
    display:flex;align-items:center;gap:16px;padding:0 20px;
    background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  header::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;
    background:linear-gradient(90deg,#e11d48,#d97706,#eab308,#059669,#0891b2,#4f46e5,#7c3aed);opacity:.85}
  header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.5px;white-space:nowrap}
  header h1 .em{color:var(--accent)}
  .search{flex:1;max-width:340px;position:relative}
  .search input{width:100%;padding:8px 12px 8px 34px;border-radius:10px;
    border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:14px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:10px;top:9px;opacity:.6}
  .tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .tabs button{padding:8px 14px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--muted);font-size:13.5px;cursor:pointer;transition:.15s;font-family:inherit}
  .tabs button:hover{color:var(--text);border-color:var(--accent)}
  .tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;box-shadow:0 2px 10px rgba(14,155,196,.35)}
  .wrap{position:fixed;top:60px;left:0;right:0;bottom:0;display:flex}
  aside{width:290px;flex:none;overflow-y:auto;padding:16px 10px 60px;
    border-right:1px solid var(--line);background:rgba(255,255,255,.55)}
  .cat{margin:10px 8px 4px;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--dim)}
  .navlink{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;
    color:var(--muted);cursor:pointer;font-size:14px;transition:.12s}
  .navlink:hover{background:var(--panel);color:var(--text)}
  .navlink.active{background:var(--panel2);color:#123039;font-weight:700;box-shadow:inset 3px 0 0 var(--accent)}
  .navlink .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .navlink small{color:var(--dim);font-size:10.5px;margin-left:auto;text-align:right}
  main{flex:1;overflow-y:auto;padding:38px 46px 90px;scroll-behavior:smooth}
  .note{max-width:820px;margin:0 auto;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .crumbs{font-size:13px;color:var(--dim);margin-bottom:10px}
  .crumbs .tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11.5px;font-weight:700;margin-right:6px}
  h2.title{font-size:29px;margin:2px 0 4px;font-weight:800}
  .en{color:var(--muted);font-size:15px;margin-bottom:18px;letter-spacing:.5px}
  .callout{background:linear-gradient(180deg,rgba(34,211,238,.12),rgba(34,211,238,.03));
    border-left:3px solid var(--accent);border-radius:8px;padding:12px 16px;margin:18px 0;color:#123039}
  .callout b{color:#0e5a6b}
  main h3{font-size:18px;margin:26px 0 8px;color:#123039;border-bottom:1px solid var(--line);padding-bottom:6px}
  main p{margin:10px 0}
  main ul{margin:10px 0;padding-left:22px}
  main li{margin:5px 0}
  .diagram{width:100%;border-radius:12px;border:1px solid var(--line);margin:16px 0;background:#fff;display:block;box-shadow:0 2px 12px rgba(18,48,57,.06)}
  .formula{font-family:'Cambria Math',Georgia,serif;font-size:18px;text-align:center;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin:16px 0;color:var(--text)}
  .eqcard{background:linear-gradient(180deg,#fbfeff,#eef7fa);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;margin:18px 0;box-shadow:0 3px 14px rgba(18,48,57,.06)}
  .eqcard .eqt{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--accent);text-align:center;margin-bottom:2px}
  .eqcard .eq{font-family:'Cambria Math','Times New Roman',Georgia,serif;font-size:32px;text-align:center;
    color:#123039;margin:6px 0 16px;line-height:1.35}
  .eqcard .eq i{font-style:italic}
  .eqcard .eq sub{font-size:.6em;vertical-align:-.25em} .eqcard .eq sup{font-size:.6em;vertical-align:.5em}
  .eqcard .lg{display:grid;gap:8px}
  .eqcard .row{display:flex;gap:14px;align-items:baseline;padding:9px 14px;background:#fff;border:1px solid var(--line);border-radius:10px}
  .eqcard .s{font-family:'Cambria Math','Times New Roman',Georgia,serif;font-style:italic;font-weight:800;
    font-size:20px;min-width:58px;text-align:center;flex:none}
  .eqcard .s sub{font-size:.6em;vertical-align:-.2em}
  .eqcard .m{font-size:13.5px;color:#2b4a53;line-height:1.6}
  .eqcard .m b{color:#123039}
  .eqcard .u{display:inline-block;margin-left:8px;font-size:11.5px;color:#5b8090;background:#eef6f9;
    border:1px solid var(--line);border-radius:20px;padding:1px 9px}
  .eqcard .cap{font-size:12.5px;color:var(--dim);text-align:center;margin-top:12px}
  table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
  th,td{border:1px solid var(--line);padding:8px 12px;text-align:left}
  th{background:#e4f1f5;color:#123039;font-weight:700}
  td{background:#fbfeff;color:#2b4a53}
  tr:nth-child(even) td{background:#f2f8fb}
  a.wl{color:var(--accent);cursor:pointer;text-decoration:none;border-bottom:1px dashed rgba(34,211,238,.5)}
  a.wl:hover{color:#0b5566;background:rgba(14,155,196,.14);border-radius:3px}
  .related{margin-top:34px;padding-top:16px;border-top:1px solid var(--line)}
  .related .cat{margin-left:0}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .pathrow{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:16px 0 8px}
  .stage{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:24px;background:#fff;
    border:1px solid var(--line);cursor:pointer;font-weight:700;color:#123039;transition:.15s;box-shadow:0 1px 6px rgba(18,48,57,.05)}
  .stage:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(18,48,57,.12);border-color:var(--accent)}
  .stage .d{width:10px;height:10px;border-radius:50%;flex:none}
  .pathrow .arrow{color:var(--dim);font-weight:800;font-size:16px}
  .catgroup{margin:14px 0}
  .catgroup .cl{font-size:12.5px;font-weight:800;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .catgroup .cl .d{width:9px;height:9px;border-radius:50%}
  .chip{padding:6px 14px;border-radius:20px;background:var(--panel);border:1px solid var(--line);
    color:var(--muted);cursor:pointer;font-size:13.5px;transition:.12s}
  .chip:hover{background:var(--accent);color:#04222a;border-color:var(--accent)}
  .nav-btns{display:flex;justify-content:space-between;margin-top:26px;gap:10px}
  .nav-btns button{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--muted);cursor:pointer;text-align:left;font-family:inherit;transition:.12s}
  .nav-btns button:hover{border-color:var(--accent);color:#0e5a6b;background:#f0f9fc}
  .nav-btns small{display:block;color:var(--dim);font-size:11px}
  .kbox{background:linear-gradient(180deg,rgba(52,211,153,.12),rgba(52,211,153,.03));
    border:1px solid rgba(52,211,153,.35);border-radius:12px;padding:14px 18px;margin:22px 0}
  .kbox .kt{font-weight:800;color:var(--green);font-size:14px;margin-bottom:6px}
  .kbox ul{margin:4px 0 0;padding-left:20px} .kbox li{margin:3px 0}
  .collap{border:1px solid var(--line);border-radius:10px;margin:12px 0;overflow:hidden;background:#f4fafc}
  .collap>summary{cursor:pointer;padding:12px 16px;font-weight:700;color:#123039;list-style:none;display:flex;align-items:center;gap:8px}
  .collap>summary::-webkit-details-marker{display:none}
  .collap>summary::before{content:'▸';color:var(--accent);transition:.2s;display:inline-block}
  .collap[open]>summary::before{transform:rotate(90deg)}
  .collap>summary:hover{background:var(--panel)}
  .collap .body{padding:2px 18px 16px;color:#2b4a53}
  .collap.myth{background:#fff5f6}.collap.myth>summary{color:#be123c}.collap.myth>summary::before{color:var(--pink)}
  .collap.fact{background:#f1fbf6}.collap.fact>summary{color:#047857}.collap.fact>summary::before{color:var(--green)}
  .collap.deep{background:#f5f4fe}.collap.deep>summary{color:#3730a3}.collap.deep>summary::before{color:#4f46e5}
  .collap>summary:hover{background:rgba(0,0,0,.03)}
  .myth-row{display:flex;gap:10px;margin:10px 0}
  .myth-row .x{color:var(--pink);font-weight:800;flex:none}.myth-row .o{color:var(--green);font-weight:800;flex:none}
  .hero{text-align:center;padding:14px 0 10px}
  .hero .big{font-size:40px;font-weight:800;margin:12px 0 4px}
  .hero .sub{color:var(--muted);max-width:640px;margin:0 auto 8px}
  .stats{display:flex;gap:12px;justify-content:center;margin:22px 0;flex-wrap:wrap}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 20px;text-align:center}
  .stat b{font-size:24px;display:block;color:var(--accent)} .stat span{font-size:12px;color:var(--dim)}
  #graphView,#demoView,#meshView{flex:1;position:relative;display:none}
  #demoView,#meshView{overflow-y:auto;padding:24px 30px 80px}
  #graph{width:100%;height:100%;display:block;cursor:grab}
  .legend{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.9);border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;font-size:13px;backdrop-filter:blur(6px);box-shadow:0 2px 12px rgba(18,48,57,.08)}
  .legend div{display:flex;align-items:center;gap:8px;margin:4px 0;color:var(--muted)}
  .legend i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .hint{position:absolute;bottom:16px;right:18px;color:var(--dim);font-size:12px}
  .gnode{cursor:pointer}.gnode text{font-size:12px;fill:var(--text);pointer-events:none;font-family:inherit}
  .gnode circle{transition:r .15s}
  .gedge{stroke:#b7d3dd;stroke-width:1.4}.gedge.hl{stroke:var(--accent);stroke-width:2.6}
  /* demo */
  .demo{max-width:900px;margin:0 auto}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin:18px 0;box-shadow:0 4px 20px rgba(18,48,57,.06)}
  .panel h3{margin:0 0 4px;color:#123039;font-size:18px;border:none}
  .panel .d{color:var(--dim);font-size:13px;margin-bottom:12px}
  .controls{display:flex;flex-wrap:wrap;gap:20px;align-items:center;margin-top:14px}
  .controls label{font-size:13px;color:var(--muted);display:flex;flex-direction:column;gap:6px;min-width:190px}
  .controls input[type=range]{accent-color:var(--accent)}
  .controls .val{color:var(--accent);font-weight:700}
  .controls button{padding:9px 16px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--text);cursor:pointer;font-family:inherit}
  .controls button:hover{border-color:var(--accent)}
  canvas.cv{width:100%;border-radius:12px;background:linear-gradient(180deg,#fbfeff,#eef7fa);border:1px solid var(--line);display:block}
  .bars{display:flex;gap:18px;margin-top:14px}
  .bar{flex:1;text-align:center}
  .bar .track{height:120px;background:var(--panel2);border-radius:8px;position:relative;overflow:hidden;border:1px solid var(--line)}
  .bar .fill{position:absolute;bottom:0;left:0;right:0;transition:height .08s}
  .bar .lbl{font-size:13px;color:var(--muted);margin-top:6px}
  .bar .pct{font-weight:800;color:#123039}
  svg#mesh{width:100%;height:auto;background:linear-gradient(180deg,#fbfeff,#eef7fa);border:1px solid var(--line);border-radius:12px}
  .cpl{cursor:pointer}
  .chartbox{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin:16px 0;box-shadow:0 2px 12px rgba(18,48,57,.05)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#b7d3dd;border-radius:6px}
  @media(max-width:720px){aside{position:fixed;z-index:15;height:100%;transform:translateX(-100%);transition:.25s}
    aside.open{transform:none}main{padding:24px 18px 80px}.search{max-width:none}header h1{font-size:14px}}
</style>
</head>

")+\'。</p>'},
{id:"為什麼要用光子",en:"Why Photonics",cat:"基礎",html:
 '<div class="callout"><b>這篇要回答：</b>電訊號幾乎都能做到，為什麼還要換成光？答案在「傳導的物理極限」。</div> <h3>電訊號的代價：幫電容充放電</h3><p>每翻轉一次電位，能耗約 E ≈ ½CV²。導線電阻與電容都隨長度增加，高頻時集膚效應（電阻∝√f）與介電損耗（∝f）再疊加，讓長距離高速電訊號的能耗隨頻率、距離同時惡化。</p> <h3>為什麼光子不受這個限制</h3><p>光纖/波導損耗主要來自散射與吸收，<b>幾乎不隨調變速率變化</b>——1 Gb/s 跟 400 Gb/s 打進同一段光纖衰減幾乎一樣，因為傳輸過程不需要對線路電容充放電，能耗只發生在「產生光」與「偵測光」兩端。</p> <h3>頻寬-距離乘積</h3><p>銅線頻寬隨距離快速下降，光纖頻寬幾乎與距離無關（色散補償後）——這正是所有長距離大頻寬鏈路最終都轉向光的原因：不是光「比較快」，是光的損耗機制不會被頻率懲罰。</p> <p>具體實現 → \'+L("矽光子技術")+\'；應用戰場 → \'+L("光收發器")+\' · \'+L("共封裝光學")+\'。</p>'},
{id:"矽光子技術",en:"Silicon Photonics · SOI",cat:"基礎",html:
 '<div class="callout"><b>這篇要回答：</b>光學材料很多，為什麼矽光子成主流？物理夠好、經濟夠便宜兩者缺一不可。</div> <h3>光學上：折射率對比夠高</h3><p>矽 n≈3.48 包在氧化矽 n≈1.44 中，用平板波導的歸一化頻率 V = (2πa/λ)√(n₁²−n₂²) 描述侷限能力：對比越大，V 越大，能用越小截面把光關住（單模條件 V&lt;2.405）。矽/氧化矽的高對比讓波導可窄到數百奈米、彎曲半徑僅數微米——這是高密度整合的物理根本。</p> <h3>經濟上：借用 CMOS 產能</h3><p>矽光子製程與 CMOS 高度重疊，可直接沿用既有晶圓廠的微影、蝕刻、良率控制，不必為光學另蓋新廠——電路與光路能整合在同一封裝，見 \'+L("製程與代工")+\'。</p> <h3>代價：矽不發光</h3><p>矽是間接能隙半導體，天生不太會發光（見 \'+L("光源與雷射整合")+\'）——這是「借用 CMOS 製程」必須付出的唯一代價。</p> <p>高對比的後果 → \'+L("波導")+\'。</p>'},
{id:"光子電路的複雜度擴展",en:"Scaling Complexity",cat:"基礎",html:
 '<div class="callout"><b>這篇要回答：</b>電子 IC 能塞幾十億顆電晶體，光子電路能無限擴大嗎？限制不是尺寸，是<b>損耗</b>。</div> <h3>為什麼光子電路不能像電子一樣「再生」訊號</h3><p>數位訊號每經過一個邏輯閘都會被拉回乾淨的 0/1，錯誤不累積；光訊號沒有這種機制，每經過一個元件（轉彎、耦合器、交叉點）就多一點插入損耗，且會一路累加：P_out(dBm) = P_in − N × L_elem。</p> <h3>這如何決定電路規模上限</h3><p>只要定出偵測器可用的最低功率 P_min，就能反推最大元件數 N_max = (P_in − P_min) / L_elem——這代表光子電路的「摩爾定律」不是元件變小就能無限疊代，必須同步壓低每元件插入損耗，規模才能往上長。這正是 \'+L("可程式化光子電路")+\' 網格節點數被斤斤計較的原因。</p> <p>元件損耗來源 → \'+L("波導")+\' · \'+L("方向耦合器與分光器")+\'；系統總帳 → \'+L("挑戰")+\'。</p>'},
{id:"波導",en:"Waveguide",cat:"被動",html:
 '<div class="callout"><b>這篇要回答：</b>光怎麼被「關」在數百奈米寬的通道裡？有效折射率、單模條件怎麼推出來？</div> <h3>全內反射：為什麼高對比能困住光</h3><p>芯（n₁）包覆（n₂）界面，臨界角 θc = arcsin(n₂/n₁)。對比越大，臨界角越小，波導能容忍更緊的彎折半徑而不漏光。</p> <h3>有效折射率 n_eff 怎麼來</h3><p>場有一部分穿透進包覆（消逝波），解 Maxwell 方程配邊界條件得到離散傳播常數 β，定義 n_eff = β/k₀，介於 n₁、n₂ 之間——波導越窄，n_eff 越接近 n₂；越寬越接近 n₁。</p> <h3>為什麼要限制單模</h3><p>V = (2πa/λ)√(n₁²−n₂²) &lt; 2.405 只允許基模傳播。多模波導裡各模態速度不同會色散失真，且下游 \'+L("馬赫-曾德干涉儀")+\'、\'+L("環形諧振器")+\' 的干涉行為都假設單模——這是矽波導要窄到約 500 nm 的原因。</p> <p>光如何進出晶片 → \'+L("光柵耦合器與邊緣耦合")+\'。</p>'},
{id:"光柵耦合器與邊緣耦合",en:"Grating / Edge Coupler",cat:"被動",html:
 '<div class="callout"><b>這篇要回答：</b>光纖芯徑約 10 µm、波導只有 0.5 µm，這麼大的落差怎麼對接？</div> <h3>邊緣耦合：漸縮波導</h3><p>波導末端做成錐形（taper），讓模態沿波導緩慢放大。為什麼要漸變：轉換太快會激發高階模態或輻射損耗；絕熱錐形能讓基模平順演化。頻寬廣、偏振損耗低，但需拋光晶圓邊緣。</p> <h3>光柵耦合器：用繞射轉個彎</h3><p>表面刻週期性溝槽，靠繞射把光從表面耦合進波導：n_eff sinθ = n_eff,wg − mλ/Λ。為什麼要傾斜 8–10°：完全垂直入射時 +1/−1 級對稱分走能量、還有背向反射問題；傾斜角讓能量集中單一繞射級。可晶圓級測試但頻寬窄、偏振敏感。</p> <p>前提：模場由波導尺寸決定 → \'+L("波導")+\'；影響鏈路預算 → \'+L("光收發器")+\'。</p>'},
{id:"方向耦合器與分光器",en:"Directional Coupler / MMI",cat:"被動",html:
 '<div class="callout"><b>這篇要回答：</b>兩條靠近的波導為什麼會交換能量？分光比怎麼被耦合長度精確控制？</div> <h3>耦合模理論</h3><p>消逝場重疊使兩波導弱耦合：da₁/dz=−jκa₂，da₂/dz=−jκa₁，κ 由間距與模場重疊決定。</p> <h3>為什麼解出來是 sin²/cos²</h3><p>解得 P₁(z)=cos²(κz)，P₂(z)=sin²(κz)——能量像兩個同頻鐘擺互相傳遞。耦合長度 L_c=π/2κ 走完即 100% 交叉，L_c/2 即 50:50。精準控制間距與長度就能做任意分光比。</p> <h3>MMI：另一種機制</h3><p>靠多模干涉的「自成像」效應分光，分光比由幾何尺寸決定，對製程誤差比消逝場耦合更穩健，代價是元件較長。</p> <p>組成 → \'+L("馬赫-曾德干涉儀")+\'；依賴 → \'+L("波導")+\'。</p>'},

{id:"環形諧振器",en:"Ring Resonator",cat:"被動",html:
 '<div class="callout"><b>這篇要回答：</b>環形波導為何只對特定波長「有反應」？FSR、Q 值怎麼從「繞一圈」推出來？</div> <h3>共振條件</h3><p>繞環一圈的光程要是整數倍波長：n_eff·L=mλ。若相位沒對齊整數倍 2π，每圈疊加會逐漸抵消；對齊時光才能一圈圈疊加、把能量攢起來形成共振尖峰。</p> <h3>FSR 從哪來</h3><div class="formula">FSR ≈ λ² / (n_g · L)</div><p>環越小，相鄰共振波長間距越大（同樣 ΔL 對應更大 Δλ）——這是設計 \'+L("分波多工")+\' 通道間距時環半徑怎麼選的依據。</p> <h3>Q 值：共振多尖</h3><p>Q=λ/Δλ_FWHM。損耗越小，光在環內繞越多圈才洩漏，共振條件被要求得越嚴格，峰越窄——「時域存活越久 ↔ 頻域峰越窄」，跟微波諧振腔同源。</p> <p>對照 → \'+L("馬赫-曾德干涉儀")+\'；調諧 → \'+L("相位器")+\'；應用 → \'+L("調變器")+\' · \'+L("分波多工")+\'。</p>'},
{id:"相位器",en:"Phase Shifter",cat:"主動",html:
 '<div class="callout"><b>這篇要回答：</b>電怎麼「推」光的相位？Vπ·L 這個指標怎麼從相位公式直接讀出來？</div> <h3>相位怎麼來</h3><div class="formula">φ = (2π/λ)·n·L</div><p>要調相位就是用電改變 n 或 L，Δφ=(2π/λ)ΔnL 要可控。</p> <h3>四種機制的取捨</h3><p><b>熱光</b>：加熱改折射率，變化大但慢（µs 級）、持續耗電。<b>載子色散</b>：注入/抽出載子改折射率，奈秒級快但矽電光效應弱、且 Δn 與 Δα 同時變化（吸收損耗跟著漲）。<b>相變材料</b>：非揮發（斷電保持狀態），適合 \'+L("可程式化光子電路")+\'，但切換需能量脈衝、壽命有限。<b>MEMS</b>：變化量大但慢、有機械疲勞風險。</p> <h3>為什麼用 Vπ·L 評分</h3><p>V 與 L 可互換（拉長 L 可用較小電壓達到同樣 Δφ），乘積才是與尺寸無關、能公平比較不同技術的指標。</p> <p>應用 → \'+L("馬赫-曾德干涉儀")+\' · \'+L("環形諧振器")+\' · \'+L("調變器")+\'。</p>'},
{id:"調變器",en:"Modulator · MZM",cat:"主動",html:
 '<div class="callout"><b>這篇要回答：</b>相位調變跟強度調變之間，是怎麼被 MZI 或環轉換過去的？</div> <h3>為什麼不能直接用相位器</h3><p>偵測器只感測強度 |E|²，對純相位變化不敏感——必須把相位差轉成干涉結果才能被讀到。</p> <h3>MZM：靠 cos² 把相位變強度</h3><p>相位器放進 MZI 一臂：P_out(V)∝cos²(Δφ(V)/2)。為什麼用差動（push-pull）驅動：只調一臂會引入啁啾（瞬時頻率隨強度變化，在光纖色散中失真）；兩臂反向變化能保持平均相位穩定，大幅降低啁啾。</p> <h3>環調變器：靠共振偏移</h3><p>\'+L("環形諧振器")+\' 穿透率在共振附近極陡峭，小幅移動共振波長就能在通/阻間快速切換，且高 Q 放大了靈敏度——體積小、功耗低，代價是對溫度敏感需主動鎖溫。</p> <table><tr><th></th><th>MZM</th><th>環調變器</th></tr><tr><td>體積</td><td>大</td><td>小</td></tr><tr><td>功耗</td><td>較高</td><td>低</td></tr><tr><td>溫控</td><td>不需要</td><td>需要</td></tr></table> <p>應用 → \'+L("光收發器")+\' · \'+L("共封裝光學")+\'。</p>'},
{id:"光偵測器",en:"Photodetector",cat:"主動",html:
 '<div class="callout"><b>這篇要回答：</b>光子怎麼變電流？響應度公式怎麼來？為什麼矽做不了通訊波段偵測器？</div> <h3>光電轉換</h3><div class="formula">R = I_photo / P_optical = η·q/hν</div><p>q/hν 是「每焦耳光能對應多少電荷」的換算，η（量子效率）折進非理想因素。</p> <h3>為什麼矽「看不見」1550 nm</h3><p>矽能隙 E_g≈1.12 eV，對應截止波長約 1100 nm；1310/1550 nm 光子能量低於能隙，矽幾乎不吸收——這正是矽波導低損耗的原因，卻也代表矽不能當這個波段的偵測器。</p> <h3>為什麼選鍺</h3><p>鍺能隙約 0.66 eV，截止波長約 1880 nm，涵蓋 C 波段；且可直接磊晶生長在矽上（Ge-on-Si），與 CMOS 相容——不需要像雷射一樣異質接合，是矽光子平台少數能自己補上的主動元件缺口。</p> <p>吸收層厚→效率高但渡越時間長，速度受限——頻寬-效率取捨。應用 → \'+L("光收發器")+\'。</p>'},
{id:"光源與雷射整合",en:"Laser Integration",cat:"主動",html:
 '<div class="callout"><b>這篇要回答：</b>矽光子幾乎什麼都能自己做，唯獨雷射做不好——物理根源是什麼？</div> <h3>直接 vs 間接能隙</h3><p>直接能隙材料（GaAs、InP）導帶最低點與價帶最高點在同一動量，躍遷只需放光子，效率高。矽是間接能隙——導帶與價帶最低/最高點動量不同，躍遷須同時發射/吸收聲子補動量差。</p> <h3>為什麼差了幾個數量級</h3><p>直接躍遷是二體過程（電子+光子），間接躍遷是三體過程（電子+光子+聲子）——機率遠低於二體過程，這是能帶結構的幾何事實，不是矽的品質問題。矽的自發輻射效率因此低上萬倍，增益不足以克服損耗起振。</p> <h3>三條解法</h3><p><b>III-V 異質整合</b>：晶粒鍵合到矽上，增益在 III-V、光模態延伸進矽波導——目前主流。<b>外部雷射</b>：完全不整合，光纖打光進晶片，多一道對準成本。<b>鍺錫合金/應變工程</b>：把鍺能帶拉向直接能隙，尚未大規模商用。</p> <p>平台限制 → \'+L("矽光子技術")+\'；系統方案 → \'+L("共封裝光學")+\'。</p>'},
{id:"可程式化光子電路",en:"Programmable Photonics",cat:"程式",html:
 '<div class="callout"><b>這篇要回答：</b>一顆晶片靠軟體設定就能變濾波器、路由器或運算單元——「通用」在數學上怎麼被保證？</div> <h3>任意線性光學＝么正矩陣</h3><div class="formula">E_out = U · E_in</div><p>無損系統（能量守恆）保證 U 么正，跟 S 參數的么正性同一套邏輯。</p> <h3>為什麼 MZI 網格能做到「任意」</h3><p>Reck/Clements 分解證明：任意 N×N 么正矩陣可分解成一系列 2×2 么正變換（正是 MZI+相位器能實現的操作）。為什麼數字對得上：么正矩陣自由度是 N²（N(N−1) 個旋轉角＋N 個相位），每個 \'+L("可調基本單元")+\' 恰好貢獻 2 個自由度，用 N(N−1)/2 個單元排成網格，總自由度剛好對上，可用逐步消去法把任意 U 分解、映射回每個單元設定值。</p> <h3>為什麼比做 N 個專用電路划算</h3><p>只需一種硬體拓樸，功能差異全靠燒錄設定——本質是把「多個 ASIC」換成光域的「可燒錄 FPGA」。</p> <p>排列方式 → \'+L("光子網格")+\'；應用 → \'+L("Field-Programmable Photonic Array")+\' · \'+L("光子運算")+\'。</p>'},
{id:"可調基本單元",en:"Tunable Basic Unit",cat:"程式",html:
 '<div class="callout"><b>這篇要回答：</b>一個 2×2 可調耦合器要怎麼設計，才能同時控制分光比與相位？</div> <h3>為什麼單一 MZI 不夠</h3><p>只用一個相位器時分光比可調，但兩輸出的相對相位固定死——要當獨立 2×2 么正單元，需要兩個自由度。</p> <h3>標準結構</h3><p>MZI 內部相位器 θ 控分光比（cross↔bar 連續變化），輸出端再加相位器 φ 校正整體相位——θ 只決定「多少功率去哪」，φ 只決定「相位差」，兩者正交，剛好對應 2×2 么正矩陣的 2 個獨立參數。少一個相位器就只能覆蓋 U 的子集合。</p> <h3>Bar / Cross</h3><p>θ=0 直通（bar），θ=π 完全交換（cross）。\'+L("Field-Programmable Photonic Array")+\' 常只用這兩個極限狀態當數位開關，但連續可調的能力才是它比機械開關更強大之處。</p> <p>組成 → \'+L("馬赫-曾德干涉儀")+\'；排列 → \'+L("光子網格")+\'。</p>'},
{id:"光子網格",en:"Photonic Mesh",cat:"程式",html:
 '<div class="callout"><b>這篇要回答：</b>把很多 \'+L("可調基本單元")+\' 排起來有前饋、循環兩種拓樸，取捨在比什麼？</div> <h3>前饋網格</h3><p>光只往一個方向走，無迴圈。沒有回授代表系統永遠穩定、延遲固定可預測——\'+L("可程式化光子電路")+\' 的 Reck/Clements 分解本身就是前饋結構。</p> <h3>循環網格（如六角形）</h3><p>允許光走回頭路或繞圈，能實現前饋做不到的功能：IIR 濾波器、類 \'+L("環形諧振器")+\' 窄頻共振、延遲線疊加——這些都需要光多次通過同一路徑並疊加干涉。前饋只能做 FIR 等效功能。</p> <h3>代價</h3><p>循環結構需要更多交叉與彎折，累積損耗更高，還需謹慎穩定性分析（迴路增益若因製程誤差超過 1，可能出現寄生共振）；前饋結構損耗路徑固定，更容易補償。</p> <p>理論基礎 → \'+L("可程式化光子電路")+\'。</p>'},
{id:"Field-Programmable Photonic Array",en:"FPPA",cat:"程式",html:
 '<div class="callout"><b>這篇要回答：</b>FPGA 靠查表與可程式互連做任意邏輯，FPPA 想在光域複製這個想法——能走多遠？</div> <h3>複製哪個部分</h3><p>把邏輯區塊換成波導交叉開關網路，用大量 \'+L("可調基本單元")+\' 排成交叉點陣列，每點設「直通」或「交換」（bar/cross）。為什麼用交叉開關而非任意矩陣：FPPA 主要追求任意路由，比 \'+L("可程式化光子電路")+\' 追求任意么正運算更聚焦，用二元開關就夠，簡化控制複雜度。</p> <h3>為什麼光域的可程式互連更難</h3><p>數位開關只需控制通/不通，導通路徑訊號不劣化；FPPA 每個交叉點即使「直通」仍有插入損耗與串音，會隨路徑上交叉點數累積（見 \'+L("光子電路的複雜度擴展")+\'）——FPPA 的可程式規模比電子 FPGA 更早撞到物理天花板。</p>'},
{id:"光收發器",en:"Optical Transceiver",cat:"光通",html:
 '<div class="callout"><b>這篇要回答：</b>收發器模組裡雷射、調變器、偵測器怎麼分工？鏈路預算怎麼「算帳」？</div> <h3>最小組成</h3><p>發射：\'+L("光源與雷射整合")+\' 提供載波 → \'+L("調變器")+\' 寫入電訊號 → \'+L("光柵耦合器與邊緣耦合")+\' 送出晶片。接收：\'+L("光柵耦合器與邊緣耦合")+\' 進晶片 → \'+L("光偵測器")+\' 轉回電流。</p> <h3>鏈路預算</h3><p>跟微波 Friis 鏈路預算同構的算帳邏輯：</p> <div class="formula">P_rx(dBm) = P_tx − ΣL_loss</div><p>餘裕 = P_rx − P_sensitivity，通常抓 3–6 dB 安全值，因老化、對準漂移會緩慢劣化。</p> <h3>為什麼調變格式要升級</h3><p>OOK（開關鍵控）撞頻寬牆後改 PAM4（4 電平，每符號 2 位元）：在同樣元件頻寬限制下用「多電平」塞更多資訊，代價是電平間距變小、需要更高訊噪比與更複雜均衡。更高階見 \'+L("相干光通訊")+\'。</p>'},
{id:"分波多工",en:"WDM / DWDM",cat:"光通",html:
 '<div class="callout"><b>這篇要回答：</b>為什麼能在同一條光纖裡同時塞進幾十個獨立通道，彼此互不干擾？</div> <h3>為什麼波長可以共用纖芯</h3><p>光纖是線性媒介，不同波長同時傳播不互相作用；只要接收端能分開，每個波長就是獨立通道：總容量＝通道數 × 每通道速率。</p> <h3>為什麼用 \'+L("環形諧振器")+\' 陣列做合波/分波</h3><p>每個環只對特定共振波長有反應，一排環半徑略有差異、對準不同 ITU 波長，就組成波長選擇性的分類器——比稜鏡或干涉濾波片更緊湊、更適合晶片整合。</p> <h3>CWDM vs DWDM</h3><p>通道間距越窄（DWDM）能塞更多通道，但波長精度要求更高、更易串音；CWDM 用寬間距換免溫控低成本，DWDM 用精密控制換最大容量，是長途骨幹網標準。</p>'},
{id:"相干光通訊",en:"Coherent Optical",cat:"光通",html:
 '<div class="callout"><b>這篇要回答：</b>開關鍵控只傳「有沒有光」，相干通訊怎麼在一個符號裡塞進振幅、相位、偏振三維資訊？</div> <h3>為什麼要用本地振盪器</h3><p>\'+L("光偵測器")+\' 只測 |E|²，直接偵測會丟失相位。讓訊號光與本地雷射（LO）混合干涉：</p> <div class="formula">I ∝ |E_sig+E_LO|² = |E_sig|²+|E_LO|²+2|E_sig||E_LO|cos(Δφ)</div> <p>交叉項把測不到的 Δφ 轉成偵測器讀得到的強度變化——跟 \'+L("馬赫-曾德干涉儀")+\' 用干涉轉換相位是同一招式。</p> <h3>IQ 調變</h3><p>90° 光混合器把訊號分兩路，分別跟 LO 做同相(I)/正交(Q)混合，等於把複數振幅完整投影到實部虛部——發射端用兩個並聯 MZM 合成星座圖任意一點（16-QAM、64-QAM），每符號帶 log₂M 位元。</p> <h3>雙偏振</h3><p>水平/垂直偏振正交、互不干擾，等於再翻一倍通道——DP-16QAM 一符號帶 2×4=8 位元。</p>'},
{id:"共封裝光學",en:"Co-packaged Optics · CPO",cat:"光通",html:
 '<div class="callout"><b>這篇要回答：</b>為什麼交換晶片旁那幾公分電路板走線，會變成資料中心最大的功耗瓶頸？</div> <h3>電訊號能耗為何隨走線長度惡化</h3><p>驅動走線電容每次翻轉能耗約 ½CV²，電容大致隨長度線性增加。傳統架構訊號要先在 PCB 走幾公分到面板可插拔 \'+L("光收發器")+\' 才轉光，這段電路徑能耗隨資料率上升不成比例增加。</p> <h3>CPO 的省電邏輯</h3><p>把光引擎直接封裝在 ASIC 旁幾毫米內：既然能耗正比走線電容、電容正比長度，把長度從公分縮到毫米，充放電能耗等比例下降，還能省掉模組內的重定時 DSP。</p> <h3>代價</h3><p>可插拔模組壞了直接換；CPO 焊死在封裝裡，故障可能要整顆交換器下線——這是折衷方案 LPO（線性可插拔光學，拿掉模組 DSP、交換晶片直接驅動）出現的原因。</p>'},
{id:"光子運算",en:"Photonic Computing",cat:"光通",html:
 '<div class="callout"><b>這篇要回答：</b>為什麼「光的干涉」可以直接拿來做矩陣乘法？光學神經網路的速度優勢從哪來？</div> <h3>矩陣-向量乘法＝MZI 網格在做的事</h3><p>\'+L("可程式化光子電路")+\' 的 MZI 網格能實現任意 U，把輸入 x 轉成 Ux；神經網路全連接層本質正是 y=Wx。光學做乘加的方式就是波的干涉疊加——不需像電子逐一 MAC 迴圈，全通道乘加在光同時穿過網格時物理上同步完成。</p> <h3>為什麼被稱為近零延遲</h3><p>運算時間只等於光的渡越時間（奈秒級），被動干涉不需額外供電（只在設定相位器時耗電）——這跟電子每次乘法都要對電容充放電（½CV²）的能耗結構本質不同。</p> <h3>還沒取代電子運算的原因</h3><p>線性光學元件本身無法產生<b>非線性</b>（神經網路必需），常仍需光轉電做非線性再轉回光；類比精度受相位器控制精度與偵測器雜訊限制；規模受 \'+L("光子電路的複雜度擴展")+\' 的損耗預算限制。</p>'},
{id:"應用領域",en:"Applications",cat:"應用",html:
 '<div class="callout"><b>這篇要回答：</b>組合起來的 PIC 目前落地在哪些戰場？各自看重哪個物理優勢？</div> <h3>光通訊</h3><p>資料中心、電信骨幹網需要 \'+L("光收發器")+\'、\'+L("分波多工")+\'、\'+L("相干光通訊")+\' 的頻寬密度，核心訴求是傳輸能耗與頻寬解耦——市場最成熟、出貨量最大。</p> <h3>微波光子</h3><p>把微波訊號調變到光載波，利用光纖低損耗做長距離、抗電磁干擾的射頻訊號傳輸與延遲線，常見於雷達與衛星酬載。</p> <h3>光學運算 / AI 加速</h3><p>利用 \'+L("光子運算")+\' 的矩陣-干涉對應，做神經網路推論加速器。</p> <h3>感測</h3><p>\'+L("環形諧振器")+\' 對折射率變化極敏感，可做生化感測；相位干涉結構也用於 LiDAR 光學相控陣掃描。</p> <h3>量子光子</h3><p>精密操控單光子干涉與糾纏，看重的是相位控制精度而非速度。</p>'},
{id:"挑戰",en:"Challenges",cat:"應用",html:
 '<div class="callout"><b>這篇要回答：</b>把各篇的「代價」收斂成一份總帳——PIC 規模化真正卡住的是哪幾項？</div> <h3>損耗預算是根</h3><p>\'+L("光子電路的複雜度擴展")+\' 推導過，插入損耗隨元件數累加、無法再生。損耗預算越緊，元件數、雷射功率、偵測器靈敏度要求就越苛刻。</p> <h3>調諧功耗</h3><p>熱調諧維持大量 \'+L("相位器")+\' 工作點需持續供電（非相變材料是非揮發的），大規模晶片上光是維持設定值的靜態功耗就可能超過運算本身效益——\'+L("光子運算")+\' 能效優勢打折扣的主因之一。</p> <h3>校準與良率</h3><p>\'+L("環形諧振器")+\' 共振波長對奈米級製程誤差極敏感，出廠前幾乎都需逐顆量測、主動校準對準目標通道。</p> <h3>面積與雷射整合</h3><p>大規模 \'+L("光子網格")+\' 需要大量彎折交叉，累積面積遠大於電子電路；矽不發光（\'+L("光源與雷射整合")+\'）是唯一「借不到」CMOS 產能的一塊。</p> <p>母題：光沒有數位再生機制，任何損耗誤差功耗都直接累積進系統。</p>'},
{id:"製程與代工",en:"Foundry & PDK",cat:"應用",html:
 '<div class="callout"><b>這篇要回答：</b>矽光子怎麼從實驗室走向量產？PDK 扮演什麼角色？</div> <h3>為什麼能走代工模式</h3><p>矽光子製程與 CMOS 高度重疊（見 \'+L("矽光子技術")+\'），代工廠可在既有產線開光子製程模組，讓設計團隊像設計電子 IC 一樣無晶圓廠設計光子晶片。</p> <h3>PDK 提供什麼</h3><p>標準元件庫（預先驗證的 \'+L("波導")+\'、\'+L("方向耦合器與分光器")+\'、\'+L("環形諧振器")+\' 版圖與模型）、設計規則檢查、製程校正模型（尺寸誤差如何影響共振波長偏移）。</p> <h3>為什麼 PDK 對矽光子特別關鍵</h3><p>電子電路對製程誤差通常不敏感（數位有雜訊容裕），但光子元件（尤其共振類）對奈米級誤差極敏感——PDK 的製程校正模型讓設計者能在流片前就預判良率，而非流片後才發現不 work。</p> <p>良率與挑戰 → \'+L("挑戰")+\'。</p>'},
];

 fact:"16QAM 一個符號帶 4 位元，加上雙偏振等於一次送 8 位元——比 OOK 的 1 位元密得多。",
 deep:"需要 IQ <a class='wl' data-id='調變器'>調變器</a>（多個 <a class='wl' data-id='馬赫-曾德干涉儀'>MZI</a> 巢狀）與平衡 <a class='wl' data-id='光偵測器'>光偵測器</a>；近年 400ZR 標準把相干技術帶進資料中心互連。"},
"光子運算":{take:["用光做 AI 的矩陣乘法。","光通過網格一次完成整個矩陣運算。","目前定位是加速線性運算，非通用電腦。"],
 myth:[{q:"光子電腦即將取代 CPU/GPU。",a:"它擅長線性運算（如矩陣乘），但難做邏輯與記憶，短期是『加速器』而非取代。"}],
 fact:"矩陣乘法是神經網路最耗算力的部分，用光做可趨近光速且幾乎不額外耗能。",
 deep:"硬體就是 <a class='wl' data-id='光子網格'>前饋光子網格</a>（Clements/Reck）；不同 <a class='wl' data-id='分波多工'>波長</a> 可並行多組運算。限制在類比精度與光電轉換開銷（見 <a class='wl' data-id='挑戰'>挑戰</a>）。"},
"共封裝光學":{take:["把光引擎搬到交換晶片旁，縮短電通道。","大幅降低每位元能耗。","可插拔 / CPO / LPO 三條路線。"],
 myth:[{q:"CPO 只是把模組黏得近一點而已。",a:"關鍵在把耗電的長電通道換成極短連接，是為了突破功耗牆，牽涉封裝與良率的大改變。"}],
 fact:"交換晶片頻寬已達數十 Tb/s，若仍用傳統可插拔，光模組的功耗會吃掉整台交換機一大半電力。",
 deep:"LPO（線性可插拔）拿掉模組內 DSP、靠交換晶片直驅，是省電又保留可維護性的折衷；CPO 則需矽光子把 <a class='wl' data-id='調變器'>調變器</a>、<a class='wl' data-id='光偵測器'>偵測器</a>、<a class='wl' data-id='分波多工'>WDM</a> 高密度整合。"},
"光子積體電路":{deep:"材料不只矽：SiN（超低損耗）、InP（含雷射）、鈮酸鋰薄膜（高速調變）常異質整合互補；現代晶片可整合數百至上千個元件。你上網、看影片的資料，多半經過資料中心裡的矽光子 <a class='wl' data-id='光收發器'>光收發器</a>。",take:["把桌上型光學整合到一塊晶片。","光在波導中被產生、導引、調變、偵測。","是通訊、運算、感測、量子的共同底層。"],
 myth:[{q:"光子晶片就是把光纖繞在晶片上。",a:"是用微影刻出次微米波導與元件，密度與精度遠非繞光纖可比。"}],fact:"一顆現代矽光子收發晶片可整合上百個光學元件，面積僅數平方毫米。"},
"為什麼要用光子":{deep:"單芯光纖經 <a class='wl' data-id='分波多工'>WDM</a> 可達數十 Tb/s；關鍵指標是每位元能耗（pJ/bit）——距離一拉長，光遠勝銅，這正是資料中心導入 <a class='wl' data-id='共封裝光學'>共封裝光學（CPO）</a> 的主因。",take:["光子強在頻寬、低損耗、抗干擾、平行。","電子強在運算與儲存。","趨勢是電光協同，而非互相取代。"],
 myth:[{q:"用光就能做出比 CPU 更快的通用電腦。",a:"光難做邏輯與記憶，目前主要加速『線性運算與資料搬移』，仍需搭配電子。"}],fact:"光纖每公里損耗約 0.2 dB；同樣距離的銅纜會衰減到幾乎無法使用。"},
"矽光子技術":{deep:"不只 220 nm，還有厚矽與 SiN 平台各為不同應用最佳化；矽熱光係數大是雙面刃——好調諧（<a class='wl' data-id='相位器'>相位器</a>）但易受溫度干擾，<a class='wl' data-id='環形諧振器'>微環</a> 尤需鎖溫。多家晶圓廠提供 <a class='wl' data-id='製程與代工'>MPW</a> 量產。",take:["用 CMOS 製程做光路，低成本可量產。","高折射率對比讓波導又細又彎。","先天缺口：矽不會發光。"],
 myth:[{q:"矽光子的晶片跟電子晶片是同一顆。",a:"多數是各自製造再共封裝（co-packaging），少數在同製程整合。"}],fact:"標準 SOI 平台的矽層只有 220 奈米厚——約頭髮直徑的三百分之一。"},
"光子電路的複雜度擴展":{deep:"兩條擴展路線：<b>異質整合</b>（拼接不同材料的最佳元件）與 <b>可重構</b>（一片萬用晶片）。元件越多，晶圓級光學測試越關鍵；電光共整合（並排/堆疊封裝）則走向 <a class='wl' data-id='共封裝光學'>CPO</a>。",take:["光子在追趕電子 IC 的『可整合複雜度』。","元件受波長限制，難無限微縮。","可重構是突破專用晶片的一條路。"],
 myth:[{q:"光子也有和電子一樣的莫爾定律。",a:"元件尺寸受波長限制，無法照電晶體那樣指數微縮，擴展方式不同。"}],fact:"單片可程式化光子晶片已能整合數百個可調單元。"},
"波導":{deep:"損耗主要來自側壁散射；相較之下 SiN 波導可低到 <0.1 dB/cm，適合長延遲線與高 Q 濾波。矽波導對 TE／TM 偏振行為不同，需偏振管理（<a class='wl' data-id='相干光通訊'>相干系統</a> 尤其在意）。",take:["PIC 的『導線』，靠全內反射侷限光。","矽/氧化矽高對比 → 次微米、可急彎。","傳播損耗約 1–2 dB/cm。"],
 myth:[{q:"波導越粗傳光越好。",a:"太粗會支援多模、造成干擾；通訊多用單模窄波導。"}],fact:"矽波導的彎曲半徑可小到約 5 µm，這是低對比材料（如玻璃）做不到的。"},
"光柵耦合器與邊緣耦合":{deep:"光柵可設計成偏振分離光柵，一舉兩得；邊緣耦合搭懸空倒錐可達 <0.5 dB。光纖陣列（FA）的對準與封裝，是整個 <a class='wl' data-id='光收發器'>收發器</a> 成本的關鍵之一。",take:["負責光在光纖與晶片間進出。","光柵：任意位置、方便測試、有波長依賴。","邊緣：低損耗寬頻、但只能在邊緣。"],
 myth:[{q:"光進出晶片幾乎沒有損耗。",a:"耦合常是損耗大戶，每次進出可損失 1–3 dB。"}],fact:"最佳化的光柵耦合器效率可達約 80%（−1 dB），已接近邊緣耦合。"},
"方向耦合器與分光器":{deep:"方向耦合器的耦合比會隨波長改變，寬頻應用（跨整個 <a class='wl' data-id='分波多工'>C 波段</a>）常改用 MMI；3 dB（五五分光）耦合器是 <a class='wl' data-id='馬赫-曾德干涉儀'>MZI</a> 與 <a class='wl' data-id='可調基本單元'>可調基本單元</a> 的標配。",take:["分光/合光的基本元件。","靠間距與長度決定耦合比例。","cross/bar 是可程式化的基礎。"],
 myth:[{q:"分光器就是把光能量憑空複製成兩份。",a:"是把同一份能量分配到兩路，總和守恆（理想無損）。"}],fact:"MMI 分光器利用『自我成像』效應，對製程誤差比方向耦合器更寬容。"},
"馬赫-曾德干涉儀":{deep:"關鍵指標 Vπ·L 越小越省電；多個 MZI 巢狀組合成 IQ 調變器即可產生 <a class='wl' data-id='相干光通訊'>QAM 星座</a>。MZM 大但耐溫、線性好，<a class='wl' data-id='環形諧振器'>環調變器</a> 小又省電但需鎖溫。",take:["分兩臂→加相位差→合併干涉。","輸出 ∝ cos²(Δφ/2)。","光開關、調變器、可調分光器的骨幹。"],
 myth:[{q:"MZI 靠改變光的強度來運作。",a:"它改變的是『相位』，強度變化是干涉的結果。"}],fact:"只要 π 的相位差，MZI 的輸出就能從全亮切到全暗。"},
"環形諧振器":{deep:"加/取埠（add-drop）結構是 <a class='wl' data-id='分波多工'>WDM</a> 合分波的基礎；高 Q（>10⁵）可做窄濾波與單分子級感測；實務用內建加熱器＋回饋電路把共振鎖在目標通道。",take:["波長選擇性元件（濾波/調變/感測）。","FSR ≈ λ²/(n_g·L)，環越小 FSR 越大。","對溫度極敏感，需熱校準。"],
 myth:[{q:"環形諧振器對所有波長都有反應。",a:"只在滿足共振條件的離散波長才強耦合，其餘幾乎直通。"}],fact:"高 Q 微環能把光在環中『存』上數萬圈，等效路徑長達數公尺。"},
"相位器":{deep:"效率指標 Pπ（造成 π 相位所需功率），熱光式典型數 mW～數十 mW；總功耗≈Pπ×元件數，是 <a class='wl' data-id='可程式化光子電路'>可程式化光子</a> 的散熱瓶頸，也是 PCM／MEMS 非揮發相位器的研究動機。速度：熱光 µs、電光 ns～ps。",take:["電控光相位的『旋鈕』。","熱光簡單但耗電、慢、會熱串擾。","PCM/MEMS 追求低功耗、非揮發。"],
 myth:[{q:"相位器不用電就能維持設定。",a:"熱光式一斷電就歸零；要免供電得用非揮發的相變或 MEMS。"}],fact:"矽的熱光係數約 1.8×10⁻⁴/K——升溫幾十度就足以造成 π 相位差。"},
"調變器":{deep:"短距用 PAM4、長途用 <a class='wl' data-id='相干光通訊'>IQ 調變（DP-QAM）</a>；鈮酸鋰薄膜（TFLN）調變器頻寬可達 >100 GHz、Vπ 低；單波長 200G（100+ GBd PAM4）是 <a class='wl' data-id='光收發器'>800G／1.6T 模組</a> 的核心。",take:["把電資料寫進光，發射端核心。","矽靠載子耗盡（等離子色散）。","MZM 穩健、環調變器精巧省電。"],
 myth:[{q:"矽有很強的電光效應可直接調變。",a:"矽幾乎沒有線性電光效應，靠改變載子濃度間接調變，效率有限。"}],fact:"最先進的矽光調變器每位元能耗已低到 fJ（飛焦耳）等級。"},
"光偵測器":{deep:"PIN＋TIA 用於高速短距；APD（雪崩）內建增益、靈敏度高，適合長距。<a class='wl' data-id='相干光通訊'>相干</a> 接收用『平衡光偵測器』成對接收，抵消共模雜訊並取出相位資訊。",take:["把光轉回電，接收端核心。","矽不吸收電信波長，改用鍺。","響應度 >0.8 A/W、頻寬 >50 GHz。"],
 myth:[{q:"矽自己就能當好的電信波長偵測器。",a:"矽在 1550 nm 幾乎透明，需磊晶生長鍺來吸收。"}],fact:"鍺原本是最早電晶體的材料，如今在矽光子裡負責『聽光』。"},
"光源與雷射整合":{deep:"DFB 提供穩定單一波長、可調雷射供 <a class='wl' data-id='分波多工'>DWDM</a> 選道；外置雷射光源（ELS）＋光纖供光是 <a class='wl' data-id='共封裝光學'>CPO</a> 常見架構（雷射壞了只換光源）；量子點雷射對溫度較不敏感。",take:["矽間接能隙、不會發光。","主流：外接雷射或 III-V 異質整合。","是矽光子最大先天缺口。"],
 myth:[{q:"既然做得出矽調變器，做矽雷射也不難。",a:"發光需要直接能隙，矽的間接能隙讓高效發光極其困難。"}],fact:"把 III-V 材料『鍵合』到矽晶圓上，是目前把雷射真正整合上晶片的主流路線。"},
"可程式化光子電路":{deep:"兩大用途方向：訊號處理（可調濾波、延遲、波束成形）與 <a class='wl' data-id='光子運算'>線性運算／矩陣乘法</a>；自我配置（self-configuring）演算法能讓網格自動校準、逐一鎖定每個 <a class='wl' data-id='可調基本單元'>單元</a>，抵消製程誤差。",take:["一片通用晶片、軟體決定功能。","由可調單元連成網格。","類比電子 FPGA。"],
 myth:[{q:"可程式化晶片一定比專用晶片好。",a:"通用性換來更高損耗、面積與功耗；追求極致性能時專用晶片仍勝出。"}],fact:"Bogaerts 等人 2020 年在《Nature》系統性提出可程式化光子電路的架構藍圖。"},
"可調基本單元":{deep:"常見實作＝兩個 3 dB <a class='wl' data-id='方向耦合器與分光器'>耦合器</a> ＋兩個 <a class='wl' data-id='相位器'>相位器</a>（一調分光比、一調相位）；設定精度直接決定整個 <a class='wl' data-id='光子網格'>網格</a> 能實現的矩陣有多準。",take:["網格的最小積木：可調 2×2 耦合器。","可切 bar/cross 或任意分光。","本質是一個內含相位器的 MZI。"],
 myth:[{q:"一個單元只能做開/關兩種狀態。",a:"它可連續設定任意分光比與相位，不只是二元開關。"}],fact:"用足夠多的可調單元，理論上能合成任意的線性光學（么正）轉換。"},
"光子網格":{deep:"Clements 前饋網格實現 N 埠么正轉換約需 N²/2 個 <a class='wl' data-id='可調基本單元'>單元</a>，面積、損耗與控制通道隨規模快速上升；前饋做矩陣乘（<a class='wl' data-id='光子運算'>運算</a>），六角形循環網格允許迴路（濾波器、延遲線）。",take:["可調單元連成的可重構網。","前饋網格做么正矩陣。","六角形循環網格更通用（含回授）。"],
 myth:[{q:"任何網格都能做任何電路。",a:"前饋網格做不了含回授的濾波器；要迴路得用循環（如六角形）網格。"}],fact:"Clements 矩形網格比 Reck 三角形網格更緊湊、各路徑損耗更平均。"},
"Field-Programmable Photonic Array":{deep:"如同 FPGA 需要編譯器，FPPA 需工具把『想要的功能』換算成每個 <a class='wl' data-id='相位器'>相位器</a> 的設定值；目前規模遠小於電子 FPGA，殺手級方向是可重構的微波光子與 <a class='wl' data-id='光子運算'>光子運算</a>。",take:["光子版 FPGA，可反覆重新配置。","設計從硬體製造變成軟體配置。","一片晶片支援多種應用。"],
 myth:[{q:"FPPA 會完全取代所有專用光子晶片。",a:"更可能是互補：原型與中小量用 FPPA，大量高性能用專用晶片。"}],fact:"電子 FPGA 讓工程師不必開新晶片就能改電路——FPPA 想在光子界複製這件事。"},
"應用領域":{deep:"光通訊主軸（最成熟）：<a class='wl' data-id='光收發器'>收發器</a>、<a class='wl' data-id='分波多工'>WDM</a>、<a class='wl' data-id='相干光通訊'>相干</a> 與資料中心的 <a class='wl' data-id='共封裝光學'>CPO</a>；感測：光達（OPA）、生醫、光纖陀螺儀；前沿：<a class='wl' data-id='光子運算'>光子運算</a> 與量子光子。",take:["光通訊是最成熟的殺手級應用。","光學矩陣運算加速 AI。","還有微波光子、光達、量子。"],
 myth:[{q:"光子晶片主要用來做光學電腦。",a:"目前商業主力是光通訊收發器；運算與量子仍在發展中。"}],fact:"2017 年 MIT 團隊用光子網格示範了以光執行神經網路的矩陣運算。"},
"挑戰":{deep:"損耗預算實例：含多次耦合、彎折與 <a class='wl' data-id='可調基本單元'>單元</a> 的長路徑很容易累積 10+ dB，得靠光放大或減級；大型網格上千 <a class='wl' data-id='相位器'>相位器</a> 的散熱與熱串擾是硬骨頭；資料中心 24/7、車規耐溫震的長期可靠度與標準化仍在建立。",take:["損耗會沿路徑累積。","上千個相位器的功耗與校準最棘手。","光源整合仍是缺口。"],

"製程與代工":{deep:"PDK 持續擴充（從 <a class='wl' data-id='波導'>波導</a>、耦合器到 <a class='wl' data-id='調變器'>調變器</a>、<a class='wl' data-id='光偵測器'>偵測器</a>、AWG）；電光共整合（與 CMOS 3D 堆疊或並排封裝）是走向 <a class='wl' data-id='共封裝光學'>CPO</a> 的製造基礎；MPW 讓學界與新創也負擔得起流片。",take:["設計與製造分離的生態。","PDK 提供標準元件積木。","是複雜度擴展與量產的制度基礎。"],

function renderNote(id){
 const n=NById[id];if(!n){renderHome();return;}
 current=id;const idx=NOTES.findIndex(x=>x.id===id);const prev=NOTES[idx-1],next=NOTES[idx+1];const nb=neighborsOf(id);
 let html='<div class="note"><div class="crumbs"><span class="tag" style="background:'+CATS[n.cat].raw+'33;color:'+CATS[n.cat].raw+'">'+CATS[n.cat].name+'</span></div>'+
  '<h2 class="title">'+n.id+'</h2><div class="en">'+n.en+'</div>'+n.html;
 const ex=EXTRA[id];
 if(ex){
  if(ex.take)html+='<div class="kbox"><div class="kt">🎯 重點回顧</div><ul>'+ex.take.map(t=>'<li>'+t+'</li>').join('')+'</ul></div>';
  if(ex.myth)html+='<details class="collap myth"><summary>💡 常見誤解</summary><div class="body">'+ex.myth.map(m=>'<div class="myth-row"><span class="x">✗</span><div>'+m.q+'</div></div><div class="myth-row"><span class="o">✓</span><div>'+m.a+'</div></div>').join('')+'</div></details>';
  if(ex.fact)html+='<details class="collap fact"><summary>🔎 冷知識</summary><div class="body"><p>'+ex.fact+'</p></div></details>';
  if(ex.deep)html+='<details class="collap deep"><summary>📐 深入補充</summary><div class="body">'+ex.deep+'</div></details>';
 }
 if(nb.length)html+='<div class="related"><div class="cat">關聯概念</div><div class="chips">'+nb.map(x=>'<span class="chip" data-id="'+x+'">'+x+'</span>').join('')+'</div></div>';
 html+='<div class="nav-btns">'+(prev?'<button data-id="'+prev.id+'"><small>← 上一篇</small>'+prev.id+'</button>':'<button disabled style="opacity:.3"><small>—</small>第一篇</button>')+
  (next?'<button data-id="'+next.id+'" style="text-align:right"><small>下一篇 →</small>'+next.id+'</button>':'<button disabled style="opacity:.3;text-align:right"><small>—</small>最後一篇</button>')+'</div></div>';
 main.innerHTML=html;main.scrollTop=0;
 if(ex&&ex.chart)drawChart(ex.chart);

function drawChart(kind){
 const cv=document.getElementById('chart');if(!cv)return;const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,P=44;
 ctx.clearRect(0,0,W,H);
 document.getElementById('chartbox').querySelector('.ct')&&0;
 if(kind==='loss'){
  const box=document.getElementById('chartbox');
  if(!box.dataset.t){box.insertAdjacentHTML('afterbegin','<div style="font-weight:700;color:#123039;margin-bottom:2px">典型損耗來源（示意）</div><div style="color:#8aa4ae;font-size:12px;margin-bottom:8px">每經過一個環節，光功率就少一截——網格越大累積越多</div>');box.dataset.t=1;}
  const data=[['光纖耦合',2.5,'#0891b2'],['每 cm 波導',1.5,'#059669'],['每個彎折',0.05,'#059669'],['每個耦合器',0.1,'#d97706'],['每個相位器',0.3,'#7c3aed']];
  const max=2.6,bw=(W-P-20)/data.length;
  ctx.strokeStyle='#cfe0e7';ctx.beginPath();ctx.moveTo(P,10);ctx.lineTo(P,H-P);ctx.lineTo(W-10,H-P);ctx.stroke();
  data.forEach((d,i)=>{const h=(H-P-16)*Math.min(1,d[1]/max);const x=P+14+i*bw;const y=(H-P)-h;
   ctx.fillStyle=d[2];ctx.fillRect(x,y,bw*0.55,h);
   ctx.fillStyle='#123039';ctx.textAlign='center';ctx.font='11px sans-serif';ctx.fillText(d[0],x+bw*0.28,H-P+16);
   ctx.fillStyle='#4d6b76';ctx.fillText(d[1]+' dB',x+bw*0.28,y-6);});
 }
}

const svg=document.getElementById('graph');const SVGNS='http://www.w3.org/2000/svg';
let G={nodes:[],edges:[],started:false,raf:null};
function buildLegend(){document.getElementById('legend').innerHTML=Object.keys(CATS).map(k=>'<div><i style="background:'+CATS[k].raw+'"></i>'+CATS[k].name+'</div>').join('');}
function startGraph(){
 if(G.started)return;G.started=true;buildLegend();
 const W=svg.clientWidth||900,H=svg.clientHeight||600;
 const deg={};EDGES.forEach(([a,b])=>{deg[a]=(deg[a]||0)+1;deg[b]=(deg[b]||0)+1;});
 G.nodes=NOTES.map((n,i)=>({id:n.id,cat:n.cat,x:W/2+Math.cos(i/NOTES.length*6.283)*240+(Math.random()-.5)*40,y:H/2+Math.sin(i/NOTES.length*6.283)*190+(Math.random()-.5)*40,vx:0,vy:0,r:8+(deg[n.id]||1)*1.5}));
 const pos=Object.fromEntries(G.nodes.map(n=>[n.id,n]));
 while(svg.firstChild)svg.removeChild(svg.firstChild);
 const gE=document.createElementNS(SVGNS,'g'),gN=document.createElementNS(SVGNS,'g');svg.appendChild(gE);svg.appendChild(gN);
 G.edges=EDGES.map(([a,b])=>{const l=document.createElementNS(SVGNS,'line');l.setAttribute('class','gedge');gE.appendChild(l);return{a,b,el:l};});

  else{t.setAttribute('fill',r===mesh.out?'#0891b2':'#8aa4ae');t.textContent='out '+r;}});
 const st=document.getElementById('meshStatus');
 if(st)st.innerHTML=hit?'<span style="color:#059669">✓ 成功！光已佈線到 out '+mesh.target+' 🎉　按「🎯 新挑戰」再來一題</span>'
   :'<span style="color:#123039">🎯 目標：把光從 in '+mesh.input+' 導到 <b style="color:#d97706">out '+mesh.target+'</b>（目前到 out '+mesh.out+'）</span>';
}
function startMesh(){
 if(!mesh.built)buildMesh();
 cancelAnimationFrame(mesh.raf);
 (function anim(){const lp=document.getElementById('lightpath');if(lp){mesh.dash=(mesh.dash+1.4)%24;lp.setAttribute('stroke-dasharray','12 8');lp.setAttribute('stroke-dashoffset',-mesh.dash);}mesh.raf=requestAnimationFrame(anim);})();
}
/* ===== 啟動 ===== */
buildSidebar();renderHome();
</script>
</body>
