<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>控制系統 · 互動知識庫</title>
<style>
  :root{
    --bg:#eef6f9; --bg2:#ffffff; --panel:#ffffff; --panel2:#f1f8fb;
    --line:#d5e5ec; --text:#123039; --muted:#4d6b76; --dim:#8aa4ae;
    --cyan:#0891b2; --green:#059669; --amber:#d97706; --purple:#7c3aed; --pink:#e11d48;
    --accent:#0e9bc4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:
      radial-gradient(1100px 420px at 50% -120px, rgba(14,155,196,.14), transparent 70%),
      linear-gradient(180deg,#f6fbfd 0%,#e9f3f7 100%);
    color:var(--text);font-family:'PingFang TC','Microsoft JhengHei','Helvetica Neue',system-ui,sans-serif;
    line-height:1.75;overflow:hidden}
  header{position:fixed;top:0;left:0;right:0;height:60px;z-index:20;
    display:flex;align-items:center;gap:16px;padding:0 20px;
    background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  header::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;
    background:linear-gradient(90deg,#e11d48,#d97706,#eab308,#059669,#0891b2,#4f46e5,#7c3aed);opacity:.85}
  header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.5px;white-space:nowrap}
  header h1 .em{color:var(--accent)}
  .search{flex:1;max-width:340px;position:relative}
  .search input{width:100%;padding:8px 12px 8px 34px;border-radius:10px;
    border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:14px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:10px;top:9px;opacity:.6}
  .tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .tabs button{padding:8px 14px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--muted);font-size:13.5px;cursor:pointer;transition:.15s;font-family:inherit}
  .tabs button:hover{color:var(--text);border-color:var(--accent)}
  .tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;box-shadow:0 2px 10px rgba(14,155,196,.35)}
  .wrap{position:fixed;top:60px;left:0;right:0;bottom:0;display:flex}
  aside{width:290px;flex:none;overflow-y:auto;padding:16px 10px 60px;
    border-right:1px solid var(--line);background:rgba(255,255,255,.55)}
  .cat{margin:10px 8px 4px;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--dim)}
  .navlink{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;
    color:var(--muted);cursor:pointer;font-size:14px;transition:.12s}
  .navlink:hover{background:var(--panel);color:var(--text)}
  .navlink.active{background:var(--panel2);color:#123039;font-weight:700;box-shadow:inset 3px 0 0 var(--accent)}
  .navlink .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .navlink small{color:var(--dim);font-size:10.5px;margin-left:auto;text-align:right}
  main{flex:1;overflow-y:auto;padding:38px 46px 90px;scroll-behavior:smooth}
  .note{max-width:820px;margin:0 auto;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .crumbs{font-size:13px;color:var(--dim);margin-bottom:10px}
  .crumbs .tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11.5px;font-weight:700;margin-right:6px}
  h2.title{font-size:29px;margin:2px 0 4px;font-weight:800}
  .en{color:var(--muted);font-size:15px;margin-bottom:18px;letter-spacing:.5px}
  .callout{background:linear-gradient(180deg,rgba(34,211,238,.12),rgba(34,211,238,.03));
    border-left:3px solid var(--accent);border-radius:8px;padding:12px 16px;margin:18px 0;color:#123039}
  .callout b{color:#0e5a6b}
  main h3{font-size:18px;margin:26px 0 8px;color:#123039;border-bottom:1px solid var(--line);padding-bottom:6px}
  main p{margin:10px 0}
  main ul{margin:10px 0;padding-left:22px}
  main li{margin:5px 0}
  .diagram{width:100%;border-radius:12px;border:1px solid var(--line);margin:16px 0;background:#fff;display:block;box-shadow:0 2px 12px rgba(18,48,57,.06)}
  .formula{font-family:'Cambria Math',Georgia,serif;font-size:18px;text-align:center;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin:16px 0;color:var(--text)}
  .eqcard{background:linear-gradient(180deg,#fbfeff,#eef7fa);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;margin:18px 0;box-shadow:0 3px 14px rgba(18,48,57,.06)}
  .eqcard .eqt{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--accent);text-align:center;margin-bottom:2px}
  .eqcard .eq{font-family:'Cambria Math','Times New Roman',Georgia,serif;font-size:32px;text-align:center;
    color:#123039;margin:6px 0 16px;line-height:1.35}
  .eqcard .eq i{font-style:italic}
  .eqcard .eq sub{font-size:.6em;vertical-align:-.25em} .eqcard .eq sup{font-size:.6em;vertical-align:.5em}
  .eqcard .lg{display:grid;gap:8px}
  .eqcard .row{display:flex;gap:14px;align-items:baseline;padding:9px 14px;background:#fff;border:1px solid var(--line);border-radius:10px}
  .eqcard .s{font-family:'Cambria Math','Times New Roman',Georgia,serif;font-style:italic;font-weight:800;
    font-size:20px;min-width:58px;text-align:center;flex:none}
  .eqcard .s sub{font-size:.6em;vertical-align:-.2em}
  .eqcard .m{font-size:13.5px;color:#2b4a53;line-height:1.6}
  .eqcard .m b{color:#123039}
  .eqcard .u{display:inline-block;margin-left:8px;font-size:11.5px;color:#5b8090;background:#eef6f9;
    border:1px solid var(--line);border-radius:20px;padding:1px 9px}
  .eqcard .cap{font-size:12.5px;color:var(--dim);text-align:center;margin-top:12px}
  table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
  th,td{border:1px solid var(--line);padding:8px 12px;text-align:left}
  th{background:#e4f1f5;color:#123039;font-weight:700}
  td{background:#fbfeff;color:#2b4a53}
  tr:nth-child(even) td{background:#f2f8fb}
  a.wl{color:var(--accent);cursor:pointer;text-decoration:none;border-bottom:1px dashed rgba(34,211,238,.5)}
  a.wl:hover{color:#0b5566;background:rgba(14,155,196,.14);border-radius:3px}
  .related{margin-top:34px;padding-top:16px;border-top:1px solid var(--line)}
  .related .cat{margin-left:0}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .pathrow{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:16px 0 8px}
  .stage{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:24px;background:#fff;
    border:1px solid var(--line);cursor:pointer;font-weight:700;color:#123039;transition:.15s;box-shadow:0 1px 6px rgba(18,48,57,.05)}
  .stage:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(18,48,57,.12);border-color:var(--accent)}
  .stage .d{width:10px;height:10px;border-radius:50%;flex:none}
  .pathrow .arrow{color:var(--dim);font-weight:800;font-size:16px}
  .catgroup{margin:14px 0}
  .catgroup .cl{font-size:12.5px;font-weight:800;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .catgroup .cl .d{width:9px;height:9px;border-radius:50%}
  .chip{padding:6px 14px;border-radius:20px;background:var(--panel);border:1px solid var(--line);
    color:var(--muted);cursor:pointer;font-size:13.5px;transition:.12s}
  .chip:hover{background:var(--accent);color:#04222a;border-color:var(--accent)}
  .nav-btns{display:flex;justify-content:space-between;margin-top:26px;gap:10px}
  .nav-btns button{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--muted);cursor:pointer;text-align:left;font-family:inherit;transition:.12s}
  .nav-btns button:hover{border-color:var(--accent);color:#0e5a6b;background:#f0f9fc}
  .nav-btns small{display:block;color:var(--dim);font-size:11px}
  .kbox{background:linear-gradient(180deg,rgba(52,211,153,.12),rgba(52,211,153,.03));
    border:1px solid rgba(52,211,153,.35);border-radius:12px;padding:14px 18px;margin:22px 0}
  .kbox .kt{font-weight:800;color:var(--green);font-size:14px;margin-bottom:6px}
  .kbox ul{margin:4px 0 0;padding-left:20px} .kbox li{margin:3px 0}
  .collap{border:1px solid var(--line);border-radius:10px;margin:12px 0;overflow:hidden;background:#f4fafc}
  .collap>summary{cursor:pointer;padding:12px 16px;font-weight:700;color:#123039;list-style:none;display:flex;align-items:center;gap:8px}
  .collap>summary::-webkit-details-marker{display:none}
  .collap>summary::before{content:'▸';color:var(--accent);transition:.2s;display:inline-block}
  .collap[open]>summary::before{transform:rotate(90deg)}
  .collap>summary:hover{background:var(--panel)}
  .collap .body{padding:2px 18px 16px;color:#2b4a53}
  .collap.myth{background:#fff5f6}.collap.myth>summary{color:#be123c}.collap.myth>summary::before{color:var(--pink)}
  .collap.fact{background:#f1fbf6}.collap.fact>summary{color:#047857}.collap.fact>summary::before{color:var(--green)}
  .collap.deep{background:#f5f4fe}.collap.deep>summary{color:#3730a3}.collap.deep>summary::before{color:#4f46e5}
  .collap>summary:hover{background:rgba(0,0,0,.03)}
  .myth-row{display:flex;gap:10px;margin:10px 0}
  .myth-row .x{color:var(--pink);font-weight:800;flex:none}.myth-row .o{color:var(--green);font-weight:800;flex:none}
  .hero{text-align:center;padding:14px 0 10px}
  .hero .big{font-size:40px;font-weight:800;margin:12px 0 4px}
  .hero .sub{color:var(--muted);max-width:640px;margin:0 auto 8px}
  .stats{display:flex;gap:12px;justify-content:center;margin:22px 0;flex-wrap:wrap}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 20px;text-align:center}
  .stat b{font-size:24px;display:block;color:var(--accent)} .stat span{font-size:12px;color:var(--dim)}
  #graphView,#demoView,#meshView{flex:1;position:relative;display:none}
  #demoView,#meshView{overflow-y:auto;padding:24px 30px 80px}
  #graph{width:100%;height:100%;display:block;cursor:grab}
  .legend{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.9);border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;font-size:13px;backdrop-filter:blur(6px);box-shadow:0 2px 12px rgba(18,48,57,.08)}
  .legend div{display:flex;align-items:center;gap:8px;margin:4px 0;color:var(--muted)}
  .legend i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .hint{position:absolute;bottom:16px;right:18px;color:var(--dim);font-size:12px}
  .gnode{cursor:pointer}.gnode text{font-size:12px;fill:var(--text);pointer-events:none;font-family:inherit}
  .gnode circle{transition:r .15s}
  .gedge{stroke:#b7d3dd;stroke-width:1.4}.gedge.hl{stroke:var(--accent);stroke-width:2.6}
  /* demo */
  .demo{max-width:900px;margin:0 auto}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin:18px 0;box-shadow:0 4px 20px rgba(18,48,57,.06)}
  .panel h3{margin:0 0 4px;color:#123039;font-size:18px;border:none}
  .panel .d{color:var(--dim);font-size:13px;margin-bottom:12px}
  .controls{display:flex;flex-wrap:wrap;gap:20px;align-items:center;margin-top:14px}
  .controls label{font-size:13px;color:var(--muted);display:flex;flex-direction:column;gap:6px;min-width:190px}
  .controls input[type=range]{accent-color:var(--accent)}
  .controls .val{color:var(--accent);font-weight:700}
  .controls button{padding:9px 16px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--text);cursor:pointer;font-family:inherit}
  .controls button:hover{border-color:var(--accent)}
  canvas.cv{width:100%;border-radius:12px;background:linear-gradient(180deg,#fbfeff,#eef7fa);border:1px solid var(--line);display:block}
  .bars{display:flex;gap:18px;margin-top:14px}
  .bar{flex:1;text-align:center}
  .bar .track{height:120px;background:var(--panel2);border-radius:8px;position:relative;overflow:hidden;border:1px solid var(--line)}
  .bar .fill{position:absolute;bottom:0;left:0;right:0;transition:height .08s}
  .bar .lbl{font-size:13px;color:var(--muted);margin-top:6px}
  .bar .pct{font-weight:800;color:#123039}
  svg#mesh{width:100%;height:auto;background:linear-gradient(180deg,#fbfeff,#eef7fa);border:1px solid var(--line);border-radius:12px}
  .cpl{cursor:pointer}
  .chartbox{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin:16px 0;box-shadow:0 2px 12px rgba(18,48,57,.05)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#b7d3dd;border-radius:6px}
  @media(max-width:720px){aside{position:fixed;z-index:15;height:100%;transform:translateX(-100%);transition:.25s}
    aside.open{transform:none}main{padding:24px 18px 80px}.search{max-width:none}header h1{font-size:14px}}
</style>
</head>
<body>

<div class="wrap">
  <aside id="sidebar"></aside>
  <main id="main"></main>
  <div id="graphView"><svg id="graph"></svg><div class="legend" id="legend"></div>
    <div class="hint">拖曳節點 · 點擊開啟筆記 · 移入高亮關聯</div></div>
  <div id="demoView"></div>
</div>

<h3>開迴路：直接卻脆弱</h3><p>開迴路控制算好輸入直接送進系統、不看結果。為什麼會失準：受控體實際行為 P(s) 幾乎不可能跟設計用的模型完全一致，開迴路沒有機制偵測、修正這個偏差。</p>
<h3>閉迴路：用量測誤差換自我修正</h3><p>把輸出量回來跟參考比較，得誤差 E(s)=R(s)−Y(s) 驅動控制器。經回授代數化簡：</p>
<div class="formula">T(s) = Y(s)/R(s) = C(s)P(s) / (1+C(s)P(s))</div>
<h3>為什麼回授能對抗模型不準：靈敏度論證</h3><p>把 P 想成有相對誤差 δ，對閉迴路公式微分定義靈敏度函數：</p>
<div class="formula">S = (∂T/T)/(∂P/P) = 1/(1+C(s)P(s))</div>
<p>開迴路時模型誤差 1:1 反映到輸出；閉迴路時只要迴路增益夠大，S≪1——模型誤差對輸出的影響被迴路增益稀釋，這是回授「用量測成本換取抗不確定性」的數學核心。</p>
<h3>簡史</h3><p>1788 瓦特離心調速器 → 1927 Black 負回授放大器（用增益換線性度）→ 1932 Nyquist 頻域穩定判據 → 1940s Bode 增益/相位邊限 → 1950s 後狀態空間方法。每一步都在回答「回授換來什麼、又要付出什麼代價」。</p>
<p>系統怎麼寫成 P(s) → ${L("動態系統建模")}；靈敏度完整分析 → ${L("回授系統初步分析")}。</p>`},
{id:"動態系統建模",ch:"2",en:"Ch.2 · Dynamic Models",cat:"建模響應",html:`<div class="callout"><b>這章的問題：</b>彈簧、電路、馬達為什麼都能寫成同一種轉移函數？方塊圖代數的化簡規則從哪來？</div>
<h3>從物理定律到微分方程</h3><p>牛頓第二定律套用在質量-彈簧-阻尼系統：</p>
<div class="formula">m·ÿ(t) + b·ẏ(t) + k·y(t) = u(t)</div>
<p>慣性項、黏滯阻力項、彈簧恢復力項相加等於外力——牛頓定律的直接展開。</p>
<h3>Laplace：把微分方程變代數</h3><div class="formula">P(s) = Y(s)/U(s) = 1 / (ms²+bs+k)</div>
<p>轉到 s 域後，多元件的串並聯回授能直接用代數組合，這是轉移函數方法撐起古典控制理論的原因。</p>
<h3>為什麼電路系統長得一樣</h3><p>RLC 電路 KVL：L q̈+Rq̇+q/C=v(t)。電感抵抗電流變化類比質量、電阻耗能類比阻尼、電容儲能類比彈簧——「儲能+耗能+恢復力」結構在能量守恆框架下數學形式必然相同（機電類比）。</p>
<h3>方塊圖代數</h3><p>串聯直接相乘（函數合成）；並聯直接相加（線性疊加）；回授化簡 E=R−HY, Y=GE 聯立消去：</p>
<div class="formula">T(s) = Y/R = G / (1+GH)</div>
<p>分母 1+GH 是解自我參照方程的必然結果。線性化（非線性系統在工作點泰勒展開）是古典線性理論能套用在真實非線性系統上的前提，見 ${L("非線性系統")}。</p>
<p>建好模型後怎麼分析 → ${L("動態響應分析")}。</p>`},

<h3>標準二階系統</h3><div class="formula">G(s) = ωn² / (s²+2ζωn·s+ωn²)</div>
<p>極點 s=−ζωn±jωn√(1−ζ²)：ζ&lt;1 欠阻尼（振盪）、ζ=1 臨界阻尼、ζ&gt;1 過阻尼。實部決定衰減快慢，虛部決定振盪頻率。</p>
<h3>超越量為什麼只跟 ζ 有關</h3><div class="formula">Mp = e^(−ζπ/√(1−ζ²))</div>
<p>ωn 只是時間軸縮放，不影響振盪的相對幅度衰減比例；ζ 決定每半週期幅度衰減的比例，這個比例與時間尺度無關。</p>
<h3>上升/安定時間為什麼反比於 ωn</h3><div class="formula">tp ≈ π/(ωn√(1−ζ²))　，　ts ≈ 4/(ζωn)</div>
<h3>Routh-Hurwitz：不解根判斷穩定</h3><p>把特徵方程係數排成陣列，第一欄變號次數＝右半平面根數——這是綜合除法反覆消去過程與根分布的代數對應。到「🔬 模擬工具 → Routh-Hurwitz」可直接檢查任意四次以內多項式。</p>
<p>極點位置怎麼被設計出來 → ${L("根軌跡設計法")}。</p>`},
{id:"回授系統初步分析",ch:"4",en:"Ch.4 · Feedback Analysis",cat:"回授設計",html:`<div class="callout"><b>這章的問題：</b>回授到底換來哪三樣具體好處？穩態誤差為什麼只看系統裡有幾個積分器就知道大概行為？</div>
<h3>回報一：靈敏度降低</h3><p>延續 ${L("導論與回授控制史")} 的 S=1/(1+CP)：迴路增益做大，模型誤差對輸出的影響被壓低。</p>
<h3>回報二：干擾抑制</h3><div class="formula">Y(s) = T(s)R(s) + [P/(1+CP)]D(s)</div>
<p>干擾到輸出的路徑也除以 (1+CP)——不需要知道干擾長怎樣，只要迴路增益夠大就自動壓小。</p>
<h3>回報三：能穩定原本不穩定的受控體</h3><p>即使 P(s) 開迴路不穩定，C(s) 設計得當閉迴路仍可能穩定。</p>
<h3>穩態誤差與系統型別</h3><p>用終值定理 e_ss=lim(s→0) sE(s)。依 s=0 處極點（積分器）個數分型別 0/1/2：</p>
<div class="formula">e_ss,step = 1/(1+Kp)　，　e_ss,ramp = 1/Kv</div>
<p>每多一個積分器，誤差常數多一次機會趨向無限大（誤差趨零）——這是控制器裡刻意加積分器消除穩態誤差的理論依據，見 ${L("頻率響應設計法與PID")} 的 PID「I」項。</p>`},

<h3>幅角條件：軌跡的骨架</h3><p>特徵方程 1+KG(s)H(s)=0 改寫成 KGH=−1，拆成：</p>
<div class="formula">∠G(s)H(s) = 180°(2k+1)　　（幅角條件，與 K 無關）</div>
<div class="formula">|K·G(s)H(s)| = 1　　（幅值條件，決定該點的 K）</div>
<p>幅角條件不含 K，只由開迴路零極點幾何位置決定——根軌跡形狀只由零極點決定，K 只決定走到骨架上哪一點。</p>
<h3>畫圖規則從哪來</h3><p>分支數＝極點數（代數基本定理）；實軸段：測試點右側零極點總數為奇數（幅角條件在實軸特例的直接推論）；漸近線角度 180°(2k+1)/(n−m)：n−m 條分支要平分角度空間同時滿足奇數倍180°的幾何要求。</p>
<h3>怎麼拿來設計</h3><p>先畫出符合超越量/安定時間規格的目標區域（見 ${L("動態響應分析")}），找根軌跡與目標區域交點，用幅值條件反推 K。到「🔬 模擬工具 → 根軌跡」可拖 K 看兩極點即時移動。</p>`},

<h3>Bode 漸近線</h3><p>一階極點 20log|G(jω)|=−20log√(1+(ω/p)²)。ω≪p 時≈0dB（水平線）、ω≫p 時≈−20log(ω/p)（−20dB/decade 直線），兩線交於轉角頻率——乘除變加減，讓複雜轉移函數的 Bode 圖能疊加畫出。</p>
<h3>相位邊限：離不穩定多遠</h3><div class="formula">PM = 180° + ∠G(jω_gc)</div>
<p>增益穿越頻率處相位若剛好 −180°，訊號繞一圈相位剛好反轉、幅值不變——系統將自我維持振盪。PM 越大裕度越足，經驗上 ζ≈PM/100。</p>
<h3>PID：三個獨立的物理作用</h3><div class="formula">u(t) = Kp·e(t) + Ki∫e dτ + Kd·de/dt</div>
<p>P 顧反應快慢；I 持續累積誤差直到歸零——把系統型別從 0 提升到 1（見 ${L("回授系統初步分析")}），代價是拖慢響應；D 用誤差變化率預測未來、提前煞車減少超越量，代價是放大雜訊。到「🔬 模擬工具 → PID 調諧」可拖 Kp/Ki/Kd 即時看階躍響應。</p>
<h3>Ziegler-Nichols</h3><p>只用 P 加大增益到剛好持續振盪，記錄臨界增益 Ku 與週期 Tu，用經驗公式反推 PID 三個增益——不需要精確模型，工業現場常用。</p>`},

<h3>狀態：系統的完整記憶</h3><p>只要知道現在狀態與未來輸入，就能完全決定系統未來行為，不需要知道更早發生過什麼。</p>
<div class="formula">ẋ(t) = Ax(t)+Bu(t)　，　y(t) = Cx(t)+Du(t)</div>
<h3>能控性</h3><p>能控性矩陣 C=[B AB A²B ⋯]，系統能控 ⟺ C 滿秩。B 是輸入能直接影響的方向，AB 是傳遞一步後能到達的新方向——滿秩代表輸入影響能觸及每個維度。</p>
<h3>能觀性</h3><p>能觀性矩陣 O=[C; CA; CA²; ⋯]，系統能觀 ⟺ O 滿秩——與能控性互為對偶問題。</p>
<h3>極點配置</h3><p>狀態回授 u=−Kx，代入：ẋ=(A−BK)x。只要 (A,B) 能控，可證明能把 A−BK 特徵值任意配置到目標位置。到「🔬 模擬工具 → 極點配置」可拖增益即時看閉迴路極點與響應。</p>
<h3>觀測器與分離原理</h3><p>Luenberger 觀測器 x̂̇=Ax̂+Bu+L(y−Cx̂)，誤差動態 ė=(A−LC)e——只要能觀就能設計 L 讓估測誤差收斂。分離原理保證控制增益 K 與觀測器增益 L 可以分開設計、互不影響閉迴路穩定性。</p>`},
{id:"數位控制",ch:"8",en:"Ch.8 · Digital Control",cat:"進階",html:`<div class="callout"><b>這章的問題：</b>取樣頻率為什麼要大於訊號最高頻率兩倍？z 轉換為什麼是離散版的 Laplace？</div>
<h3>取樣定理</h3><p>取樣讓頻譜在頻率軸上以取樣頻率為週期複製。相鄰複製頻譜重疊會造成混疊（高頻偽裝成低頻、無法復原），要避免重疊：</p>
<div class="formula">fs > 2·f_max</div>
<h3>z 轉換</h3><p>令 z=e^(sT)，z⁻¹ 恰好對應「延遲一個取樣週期」，離散差分方程能像連續微分方程一樣用 z 轉換變成代數方程。</p>
<h3>穩定性：左半平面 → 單位圓</h3><p>s=σ+jω，σ&lt;0（連續穩定）對應 |z|=e^(σT)&lt;1——s 平面左半平面透過 z=e^(sT) 映射到 z 平面單位圓內部。</p>
<h3>零階保持與雙線性轉換</h3><p>ZOH 把取樣值保持到下一取樣時刻，等效延遲半個取樣週期、拉低相位邊限。雙線性轉換 s≈(2/T)(z−1)/(z+1) 把梯形法數值積分結果用來把類比設計轉成數位控制器，能把左半平面精確映射進單位圓。</p>`},
{id:"非線性系統",ch:"9",en:"Ch.9 · Nonlinear Systems",cat:"進階",html:`<div class="callout"><b>這章的問題：</b>線性理論為什麼只在附近有效？沒有轉移函數時怎麼分析非線性系統？</div>
<h3>線性化的局限</h3><p>泰勒展開捨去的高階項隨偏離工作點距離增長——這是所有線性設計工具（根軌跡、頻率響應）只在工作點附近成立的原因。</p>
<h3>相平面分析</h3><p>二階非線性系統改寫成一階聯立方程，在 (x1,x2) 平面畫軌跡——平衡點附近軌跡形狀直接對應線性化雅可比矩陣的特徵值型態，不解析解就能判斷穩定行為。</p>
<h3>描述函數法：預測自激振盪</h3><p>假設非線性元件輸入正弦波，只留輸出基波分量，定義等效增益 N(A)（隨振幅變化）。尋找同時滿足 1+N(A)G(jω)=0 的 (A,ω)——存在解代表系統會自己形成穩定的等幅振盪（極限環），不需外部激勵。</p>
<h3>李亞普諾夫方法</h3><p>找一個「類似能量」的函數 V(x)&gt;0，若沿系統軌跡 V̇(x)&lt;0，系統被拉向平衡點——不用解方程就能證明穩定，但沒有通用公式保證找得到合適的 V(x)。</p>`},
{id:"控制系統設計原則與案例研究",ch:"10",en:"Ch.10 · Design & Case Study",cat:"進階",html:`<div class="callout"><b>這章的問題：</b>把前九章整合起來，真實控制系統設計的流程是什麼？效能與強健性為什麼永遠要取捨？</div>
<h3>設計流程</h3><p>建模 → 分析開迴路行為 → 訂規格（超越量/安定時間/穩態誤差） → 選設計方法（根軌跡／頻域／狀態空間） → 模擬驗證 → 數位實作 → 迭代。跳過某一步容易做出「數學漂亮但不解決實際問題」的控制器。</p>
<h3>效能與強健性的張力</h3><p>迴路增益越高、S 越小、效能越好，但穩定裕度變差、雜訊被放大、執行機構可能飽和——這不是演算法不夠聰明，是模型不確定性與物理限制的根本張力，不存在數學上的最優解，只有工程上可接受的平衡點。</p>
<h3>案例：直流馬達位置控制</h3><p>電樞電路+轉子機械動態組成二三階轉移函數；型別至少為1（角速度積分成角度）；用根軌跡選比例或PD增益把主導極點配置進目標區域；數位化時取樣頻率遠高於機械頻寬、雙線性轉換離散化後燒進微控制器。這條主線串起了全書十章。</p>`},

function startGraph(){
 if(G.started)return;G.started=true;buildLegend();
 const W=svg.clientWidth||900,H=svg.clientHeight||600;
 const deg={};EDGES.forEach(([a,b])=>{deg[a]=(deg[a]||0)+1;deg[b]=(deg[b]||0)+1;});
 G.nodes=NOTES.map((n,i)=>({id:n.id,cat:n.cat,x:W/2+Math.cos(i/NOTES.length*6.283)*240+(Math.random()-.5)*40,y:H/2+Math.sin(i/NOTES.length*6.283)*190+(Math.random()-.5)*40,vx:0,vy:0,r:8+(deg[n.id]||1)*1.5}));
 const pos=Object.fromEntries(G.nodes.map(n=>[n.id,n]));
 while(svg.firstChild)svg.removeChild(svg.firstChild);
 const gE=document.createElementNS(SVGNS,'g'),gN=document.createElementNS(SVGNS,'g');svg.appendChild(gE);svg.appendChild(gN);
 G.edges=EDGES.map(([a,b])=>{const l=document.createElementNS(SVGNS,'line');l.setAttribute('class','gedge');gE.appendChild(l);return{a,b,el:l};});
 G.nodes.forEach(n=>{
  const g=document.createElementNS(SVGNS,'g');g.setAttribute('class','gnode');g.dataset.id=n.id;
  const c=document.createElementNS(SVGNS,'circle');c.setAttribute('r',n.r);c.setAttribute('fill',CATS[n.cat].raw);c.setAttribute('stroke','#ffffff');c.setAttribute('stroke-width','2.5');
  const t=document.createElementNS(SVGNS,'text');t.setAttribute('text-anchor','middle');t.setAttribute('dy',-n.r-6);t.textContent=n.id;
  g.appendChild(c);g.appendChild(t);gN.appendChild(g);n.el=g;
  g.addEventListener('mouseenter',()=>highlight(n.id,true));g.addEventListener('mouseleave',()=>highlight(n.id,false));
  let moved=false,down=false,ox,oy;
  g.addEventListener('pointerdown',ev=>{down=true;moved=false;n.fixed=true;const p=toSvg(ev);ox=p.x-n.x;oy=p.y-n.y;g.setPointerCapture(ev.pointerId);});
  g.addEventListener('pointermove',ev=>{if(!down)return;const p=toSvg(ev);n.x=p.x-ox;n.y=p.y-oy;n.vx=0;n.vy=0;moved=true;});
  g.addEventListener('pointerup',()=>{down=false;n.fixed=false;if(!moved)open(n.id);});
 });
 gloop(pos,W,H);
}
function toSvg(ev){const r=svg.getBoundingClientRect();return{x:ev.clientX-r.left,y:ev.clientY-r.top};}
function highlight(id,on){const nb=new Set(neighborsOf(id));nb.add(id);
 G.nodes.forEach(n=>{n.el.style.opacity=on?(nb.has(n.id)?1:.2):1;});
 G.edges.forEach(e=>{const rel=(e.a===id||e.b===id);e.el.classList.toggle('hl',on&&rel);e.el.style.opacity=on?(rel?1:.12):1;});}
function gloop(pos,W,H){const KR=5200,KS=0.012,L0=118,DA=0.86,GR=0.008;
 function step(){const ns=G.nodes;
  for(let i=0;i<ns.length;i++){const a=ns[i];if(a.fixed)continue;let fx=0,fy=0;
   for(let j=0;j<ns.length;j++){if(i===j)continue;const b=ns[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+.01,d=Math.sqrt(d2);const f=KR/d2;fx+=dx/d*f;fy+=dy/d*f;}
   fx+=(W/2-a.x)*GR;fy+=(H/2-a.y)*GR;a.vx=(a.vx+fx)*DA;a.vy=(a.vy+fy)*DA;}
  EDGES.forEach(([ai,bi])=>{const a=pos[ai],b=pos[bi];let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)+.01;const f=(d-L0)*KS,ux=dx/d,uy=dy/d;if(!a.fixed){a.vx+=ux*f;a.vy+=uy*f;}if(!b.fixed){b.vx-=ux*f;b.vy-=uy*f;}});
  ns.forEach(n=>{if(n.fixed)return;n.x+=n.vx;n.y+=n.vy;n.x=Math.max(n.r+40,Math.min(W-n.r-40,n.x));n.y=Math.max(n.r+30,Math.min(H-n.r-20,n.y));});
  G.edges.forEach(e=>{const a=pos[e.a],b=pos[e.b];e.el.setAttribute('x1',a.x);e.el.setAttribute('y1',a.y);e.el.setAttribute('x2',b.x);e.el.setAttribute('y2',b.y);});
  ns.forEach(n=>n.el.setAttribute('transform','translate('+n.x+','+n.y+')'));
  G.raf=requestAnimationFrame(step);}
 step();}

/* ---- 1. 二階系統階躍響應 ---- */
function toolStep(){
 document.getElementById('simBox').innerHTML=
  '<canvas id="stepCv" class="cv" width="820" height="300"></canvas>'+
  '<div class="controls"><label>阻尼比 ζ <span class="val" id="zV">0.5</span><input type="range" id="zeta" min="5" max="200" value="50"></label>'+
  '<label>自然頻率 ωn (rad/s) <span class="val" id="wV">4</span><input type="range" id="wn" min="10" max="150" value="40"></label></div>'+
  '<div id="stepRead" style="font-size:13px;color:#2b4a53;margin-top:6px"></div>';
 ['zeta','wn'].forEach(id=>document.getElementById(id).oninput=drawStep); drawStep();
}
function drawStep(){
 const cv=document.getElementById('stepCv'); if(!cv)return; const ctx=cv.getContext('2d'),W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
 const zeta=(+document.getElementById('zeta').value)/100, wn=(+document.getElementById('wn').value)/10;
 document.getElementById('zV').textContent=zeta.toFixed(2); document.getElementById('wV').textContent=wn.toFixed(1);
 const P=48,x0=P,x1=W-16,y0=H-34,yTop=20,Tmax=8/(zeta*wn+0.05);
 ctx.strokeStyle='#cfe0e7';ctx.beginPath();ctx.moveTo(x0,yTop);ctx.lineTo(x0,y0);ctx.lineTo(x1,y0);ctx.stroke();
 ctx.strokeStyle='#e3eef2';ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(x0,y0-(y0-yTop)*0.72);ctx.lineTo(x1,y0-(y0-yTop)*0.72);ctx.stroke();ctx.setLineDash([]);
 ctx.fillStyle='#8aa4ae';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.fillText('y=1',x1+4,y0-(y0-yTop)*0.72+3);ctx.fillText('t (s)',x1-24,y0+22);
 ctx.strokeStyle='#0891b2';ctx.lineWidth=2.5;ctx.beginPath();
 let Mp=0,tp=0;
 for(let i=0;i<=600;i++){
  const t=i/600*Tmax; let y;
  if(zeta<1){const wd=wn*Math.sqrt(1-zeta*zeta),phi=Math.acos(zeta); y=1-(Math.exp(-zeta*wn*t)/Math.sqrt(1-zeta*zeta))*Math.sin(wd*t+phi);}
  else if(Math.abs(zeta-1)<1e-3){y=1-Math.exp(-wn*t)*(1+wn*t);}
  else{const r1=wn*(zeta-Math.sqrt(zeta*zeta-1)),r2=wn*(zeta+Math.sqrt(zeta*zeta-1));const A=r2/(r2-r1),B=-r1/(r2-r1);y=1-A*Math.exp(-r1*t)-B*Math.exp(-r2*t);}
  if(y>Mp){Mp=y;tp=t;}
  const x=x0+(x1-x0)*t/Tmax, yy=y0-(y0-yTop)*Math.min(1.5,y)/1.5;
  i?ctx.lineTo(x,yy):ctx.moveTo(x,yy);
 }
 ctx.stroke();
 const overshoot=zeta<1?Math.exp(-zeta*Math.PI/Math.sqrt(1-zeta*zeta))*100:0;
 const ts=4/(zeta*wn);
 document.getElementById('stepRead').innerHTML='超越量 Mp = <b>'+overshoot.toFixed(1)+'%</b>　尖峰時間 tp ≈ <b>'+(zeta<1?(Math.PI/(wn*Math.sqrt(1-zeta*zeta))).toFixed(2):'—')+' s</b>　安定時間 ts(2%) ≈ <b>'+ts.toFixed(2)+' s</b>　極點 = '+(zeta<1?('-'+(zeta*wn).toFixed(2)+' ± j'+(wn*Math.sqrt(1-zeta*zeta)).toFixed(2)):('實極點 -'+(wn*(zeta-Math.sqrt(Math.max(0,zeta*zeta-1)))).toFixed(2)+', -'+(wn*(zeta+Math.sqrt(Math.max(0,zeta*zeta-1)))).toFixed(2)));
}

function toolRouth(){
 document.getElementById('simBox').innerHTML=
  '<div class="controls">'+
  '<label>a₃ (s³) <span class="val" id="r3V">1</span><input type="range" id="r3" min="1" max="20" value="10"></label>'+
  '<label>a₂ (s²) <span class="val" id="r2V">6</span><input type="range" id="r2" min="0" max="30" value="60"></label>'+
  '<label>a₁ (s¹) <span class="val" id="r1V">11</span><input type="range" id="r1" min="0" max="40" value="110"></label>'+
  '<label>a₀ (s⁰) <span class="val" id="r0V">6</span><input type="range" id="r0" min="0" max="40" value="60"></label></div>'+
  '<p style="font-size:13px;color:#6b8a92">特徵方程：a₃s³+a₂s²+a₁s+a₀ = 0</p>'+
  '<div id="routhTable"></div><div id="routhRead" style="font-size:13.5px;color:#2b4a53;margin-top:10px"></div>';
 ['r3','r2','r1','r0'].forEach(id=>document.getElementById(id).oninput=drawRouth); drawRouth();
}
function drawRouth(){
 const a3=(+document.getElementById('r3').value)/10, a2=(+document.getElementById('r2').value)/10, a1=(+document.getElementById('r1').value)/10, a0=(+document.getElementById('r0').value)/10;
 document.getElementById('r3V').textContent=a3.toFixed(1);document.getElementById('r2V').textContent=a2.toFixed(1);document.getElementById('r1V').textContent=a1.toFixed(1);document.getElementById('r0V').textContent=a0.toFixed(1);
 const row1=[a3,a1], row2=[a2,a0];
 const b1=a2!==0?(a2*a1-a3*a0)/a2:NaN;
 const row3=[b1,0];
 const c1=b1!==0?(b1*a0-a2*0)/b1:NaN;
 const row4=[c1];
 const rows=[['s³',row1],['s²',row2],['s¹',row3],['s⁰',row4]];
 let html='<table><tr><th></th><th>col1</th><th>col2</th></tr>';
 rows.forEach(r=>{html+='<tr><td><b>'+r[0]+'</b></td><td>'+(isFinite(r[1][0])?r[1][0].toFixed(2):'—')+'</td><td>'+(r[1][1]!==undefined&&isFinite(r[1][1])?r[1][1].toFixed(2):'')+'</td></tr>';});
 html+='</table>';
 document.getElementById('routhTable').innerHTML=html;
 const firstCol=[a3,a2,b1,c1];
 let signChanges=0; for(let i=1;i<firstCol.length;i++){if(isFinite(firstCol[i-1])&&isFinite(firstCol[i])&&firstCol[i-1]*firstCol[i]<0)signChanges++;}
 const stable=signChanges===0 && firstCol.every(v=>isFinite(v)&&v>0);
 document.getElementById('routhRead').innerHTML='第一欄：'+firstCol.map(v=>isFinite(v)?v.toFixed(2):'—').join(', ')+'　變號次數 = <b>'+signChanges+'</b><br>判定：<b style="color:'+(stable?'#059669':'#e11d48')+'">'+(stable?'✓ 穩定（第一欄全同號，無右半平面根）':'✗ 不穩定（變號次數 = 右半平面根數 = '+signChanges+'）')+'</b>';
}

function drawRlocus(){
 const cv=document.getElementById('rlCv'); if(!cv)return; const ctx=cv.getContext('2d'),W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
 const K=(+document.getElementById('rlK').value)/10; document.getElementById('rlKV').textContent=K.toFixed(1);

 ctx.fillStyle='#8aa4ae';ctx.font='11px sans-serif';ctx.fillText('Re',W-30,cy-8);ctx.fillText('Im',cx+8,30);
 for(let m=-3;m<=1;m++){const x=cx+m*scale;ctx.fillText(m,x-3,cy+16);}
 ctx.fillStyle='#0891b2';[0,-2].forEach(p=>{ctx.beginPath();ctx.moveTo(cx+p*scale-5,cy-5);ctx.lineTo(cx+p*scale+5,cy+5);ctx.moveTo(cx+p*scale+5,cy-5);ctx.lineTo(cx+p*scale-5,cy+5);ctx.strokeStyle='#0891b2';ctx.lineWidth=2;ctx.stroke();});
 ctx.strokeStyle='#c9b3f5';ctx.lineWidth=2;ctx.setLineDash([4,4]);
 ctx.beginPath();
 for(let kk=0;kk<=100;kk++){const k=kk/10; const disc=1-k; let re,im;
  if(disc>=0){re=-1-Math.sqrt(disc);im=0;} else {re=-1;im=Math.sqrt(-disc);}
  const x=cx+re*scale, y=cy-im*scale; kk?ctx.lineTo(x,y):ctx.moveTo(x,y);
 }
 ctx.stroke();
 ctx.beginPath();
 for(let kk=0;kk<=100;kk++){const k=kk/10; const disc=1-k; let re,im;
  if(disc>=0){re=-1+Math.sqrt(disc);im=0;} else {re=-1;im=-Math.sqrt(-disc);}
  const x=cx+re*scale, y=cy-im*scale; kk?ctx.lineTo(x,y):ctx.moveTo(x,y);
 }
 ctx.stroke(); ctx.setLineDash([]);
 const disc=1-K; let re1,im1,re2,im2;
 if(disc>=0){re1=-1-Math.sqrt(disc);im1=0;re2=-1+Math.sqrt(disc);im2=0;}
 else{re1=-1;im1=Math.sqrt(-disc);re2=-1;im2=-Math.sqrt(-disc);}
 ctx.fillStyle='#e11d48';
 [[re1,im1],[re2,im2]].forEach(([re,im])=>{ctx.beginPath();ctx.arc(cx+re*scale,cy-im*scale,6,0,7);ctx.fill();});

 document.getElementById('rlRead').innerHTML='閉迴路極點：s = '+re1.toFixed(2)+(im1?'±j'+Math.abs(im1).toFixed(2):'')+(disc>=0?(', '+re2.toFixed(2)):'')+'　　'+(K<1?'K<1：兩相異實極點（過阻尼）':(K===1?'K=1：分離點（臨界阻尼）':'K>1：共軛複數極點（欠阻尼，ζ='+(1/Math.sqrt(K)).toFixed(2)+'）'));
}

function drawBode(){
 const cv=document.getElementById('bodeCv'); if(!cv)return; const ctx=cv.getContext('2d'),W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
 const K=+document.getElementById('bK').value, p1=(+document.getElementById('bP1').value)/10, p2=(+document.getElementById('bP2').value)/10;
 document.getElementById('bKV').textContent=K;document.getElementById('bP1V').textContent=p1.toFixed(1);document.getElementById('bP2V').textContent=p2.toFixed(1);
 const x0=60,x1=W-20,yM0=20,yM1=190,yP0=220,yP1=390;
 ctx.strokeStyle='#123039';ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(x0,yM0);ctx.lineTo(x0,yM1);ctx.lineTo(x1,yM1);ctx.stroke();
 ctx.beginPath();ctx.moveTo(x0,yP0);ctx.lineTo(x0,yP1);ctx.lineTo(x1,yP1);ctx.stroke();
 ctx.fillStyle='#123039';ctx.font='12px sans-serif';ctx.fillText('增益 |G(jω)| dB',x0,14);ctx.fillText('相位 ∠G(jω) 度',x0,212);
 const wmin=0.1,wmax=1000;
 function xOf(w){return x0+(x1-x0)*(Math.log10(w)-Math.log10(wmin))/(Math.log10(wmax)-Math.log10(wmin));}
 let gcw=null,pmDeg=null,mags=[],phs=[];
 for(let i=0;i<=300;i++){
  const lw=Math.log10(wmin)+i/300*(Math.log10(wmax)-Math.log10(wmin)); const w=Math.pow(10,lw);
  const mag1=1/Math.sqrt(1+(w/p1)**2), mag2=1/Math.sqrt(1+(w/p2)**2);
  const magDb=20*Math.log10(K*mag1*mag2+1e-12);
  const ph=-(Math.atan(w/p1)+Math.atan(w/p2))*180/Math.PI;
  mags.push(magDb); phs.push(ph);
 }
 ctx.strokeStyle='#c7d8dd';ctx.setLineDash([3,3]);ctx.beginPath();const y0dB=yM1-(0-(-40))/(80)*(yM1-yM0);ctx.moveTo(x0,y0dB);ctx.lineTo(x1,y0dB);ctx.stroke();
 ctx.beginPath();const yn180=yP1-((-180)-(-270))/90*(yP1-yP0);ctx.moveTo(x0,yn180);ctx.lineTo(x1,yn180);ctx.stroke();ctx.setLineDash([]);
 ctx.strokeStyle='#0891b2';ctx.lineWidth=2.3;ctx.beginPath();
 for(let i=0;i<=300;i++){const lw=Math.log10(wmin)+i/300*(Math.log10(wmax)-Math.log10(wmin));const w=Math.pow(10,lw);
  const x=xOf(w); const yy=yM1-(mags[i]-(-40))/80*(yM1-yM0);
  if(mags[i-1]!==undefined&&mags[i-1]>=0&&mags[i]<0&&gcw===null){gcw=w;pmDeg=180+phs[i];}
  i?ctx.lineTo(x,Math.max(yM0,Math.min(yM1,yy))):ctx.moveTo(x,Math.max(yM0,Math.min(yM1,yy)));}
 ctx.stroke();
 ctx.strokeStyle='#7c3aed';ctx.lineWidth=2.3;ctx.beginPath();
 for(let i=0;i<=300;i++){const lw=Math.log10(wmin)+i/300*(Math.log10(wmax)-Math.log10(wmin));const w=Math.pow(10,lw);
  const x=xOf(w); const yy=yP1-(phs[i]-(-270))/90*(yP1-yP0);
  i?ctx.lineTo(x,Math.max(yP0,Math.min(yP1,yy))):ctx.moveTo(x,Math.max(yP0,Math.min(yP1,yy)));}
 ctx.stroke();
 document.getElementById('bodeRead').innerHTML=(gcw?('增益穿越頻率 ω_gc ≈ <b>'+gcw.toFixed(2)+' rad/s</b>　相位邊限 PM ≈ <b>'+pmDeg.toFixed(1)+'°</b>　（經驗估計 ζ≈PM/100 ≈ '+(pmDeg/100).toFixed(2)+'）'):'增益全程未穿越 0dB（在此頻率範圍內）');
}

/* ---- 5. PID 階躍響應調諧 ---- */
function toolPID(){
 document.getElementById('simBox').innerHTML=
  '<canvas id="pidCv" class="cv" width="820" height="300"></canvas>'+
  '<div class="controls"><label>Kp <span class="val" id="kpV">4</span><input type="range" id="kp" min="0" max="200" value="40"></label>'+
  '<label>Ki <span class="val" id="kiV">1</span><input type="range" id="ki" min="0" max="100" value="10"></label>'+
  '<label>Kd <span class="val" id="kdV">0.5</span><input type="range" id="kd" min="0" max="100" value="5"></label></div>'+
  '<div id="pidRead" style="font-size:13px;color:#2b4a53;margin-top:6px"></div>'+
  '<p style="font-size:12.5px;color:#8aa4ae">範例受控體：P(s)=1/(s²+s)（如馬達位置，含一個積分器與黏滯摩擦）</p>';
 ['kp','ki','kd'].forEach(id=>document.getElementById(id).oninput=drawPID); drawPID();
}
function drawPID(){
 const cv=document.getElementById('pidCv'); if(!cv)return; const ctx=cv.getContext('2d'),W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
 const Kp=(+document.getElementById('kp').value)/10, Ki=(+document.getElementById('ki').value)/10, Kd=(+document.getElementById('kd').value)/10;
 document.getElementById('kpV').textContent=Kp.toFixed(1);document.getElementById('kiV').textContent=Ki.toFixed(1);document.getElementById('kdV').textContent=Kd.toFixed(1);
 let x1=0,x2=0,ei=0,prevE=0; const dt=0.01,steps=1000; const ys=[];
 for(let i=0;i<steps;i++){
  const r=1, y=x1, e=r-y;
  ei+=e*dt; const ed=(e-prevE)/dt; prevE=e;
  let u=Kp*e+Ki*ei+Kd*ed; u=Math.max(-50,Math.min(50,u));
  const dx1=x2, dx2=-x2+u;
  x1+=dx1*dt; x2+=dx2*dt;
  ys.push(y);
 }
 const P=48,x0=P,xr=W-16,y0=H-34,yTop=20;
 ctx.strokeStyle='#cfe0e7';ctx.beginPath();ctx.moveTo(x0,yTop);ctx.lineTo(x0,y0);ctx.lineTo(xr,y0);ctx.stroke();
 const yScaleMax=1.8;
 ctx.strokeStyle='#e3eef2';ctx.setLineDash([3,3]);ctx.beginPath();const yref=y0-(y0-yTop)*(1/yScaleMax);ctx.moveTo(x0,yref);ctx.lineTo(xr,yref);ctx.stroke();ctx.setLineDash([]);
 ctx.fillStyle='#8aa4ae';ctx.font='11px sans-serif';ctx.fillText('r=1',xr+4,yref+3);
 ctx.strokeStyle='#0891b2';ctx.lineWidth=2.3;ctx.beginPath();
 let maxY=0,peakT=0;
 ys.forEach((y,i)=>{if(y>maxY){maxY=y;peakT=i*dt;} const x=x0+(xr-x0)*i/ys.length, yy=y0-(y0-yTop)*Math.min(yScaleMax,Math.max(0,y))/yScaleMax; i?ctx.lineTo(x,yy):ctx.moveTo(x,yy);});
 ctx.stroke();
 const overshoot=Math.max(0,(maxY-1)*100);
 document.getElementById('pidRead').innerHTML='最大超越量 ≈ <b>'+overshoot.toFixed(1)+'%</b>（於 t≈'+peakT.toFixed(2)+'s）　最終值 ≈ <b>'+ys[ys.length-1].toFixed(2)+'</b>　'+(Ki>0?'（Ki>0：穩態誤差理論上趨近 0）':'（Ki=0：可能有穩態誤差）');
}

/* ---- 6. 狀態空間極點配置 ---- */
function toolState(){
 document.getElementById('simBox').innerHTML=
  '<canvas id="stCv" class="cv" width="820" height="300"></canvas>'+
  '<div class="controls"><label>k1 <span class="val" id="k1V">4</span><input type="range" id="k1" min="0" max="200" value="40"></label>'+
  '<label>k2 <span class="val" id="k2V">4</span><input type="range" id="k2" min="0" max="100" value="40"></label></div>'+
  '<div id="stRead" style="font-size:13px;color:#2b4a53;margin-top:6px"></div>'+
  '<p style="font-size:12.5px;color:#8aa4ae">範例系統（雙積分器）：ẋ1=x2, ẋ2=u；狀態回授 u=−(k1·x1+k2·x2)　閉迴路特徵方程 s²+k2·s+k1=0</p>';
 ['k1','k2'].forEach(id=>document.getElementById(id).oninput=drawState); drawState();
}
function drawState(){
 const cv=document.getElementById('stCv'); if(!cv)return; const ctx=cv.getContext('2d'),W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
 const k1=(+document.getElementById('k1').value)/10, k2=(+document.getElementById('k2').value)/10;
 document.getElementById('k1V').textContent=k1.toFixed(1);document.getElementById('k2V').textContent=k2.toFixed(1);
 const disc=k2*k2-4*k1; let re1,im1,re2,im2;
 if(disc>=0){re1=(-k2-Math.sqrt(disc))/2;im1=0;re2=(-k2+Math.sqrt(disc))/2;im2=0;}
 else{re1=-k2/2;im1=Math.sqrt(-disc)/2;re2=-k2/2;im2=-Math.sqrt(-disc)/2;}
 let x1=1,x2=0; const dt=0.01,steps=800; const ys=[];
 for(let i=0;i<steps;i++){const u=-(k1*x1+k2*x2); const dx1=x2,dx2=u; x1+=dx1*dt;x2+=dx2*dt; ys.push(x1);}
 const P=48,x0=P,xr=W-16,y0=H/2,yTop=20,yBot=H-24;
 ctx.strokeStyle='#cfe0e7';ctx.beginPath();ctx.moveTo(x0,yTop);ctx.lineTo(x0,yBot);ctx.lineTo(xr,y0>yBot?yBot:y0);ctx.stroke();
 ctx.strokeStyle='#e3eef2';ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(xr,y0);ctx.stroke();
 ctx.strokeStyle='#d97706';ctx.lineWidth=2.3;ctx.beginPath();
 ys.forEach((y,i)=>{const x=x0+(xr-x0)*i/ys.length, yy=y0-y*(y0-yTop)/1.2; i?ctx.lineTo(x,yy):ctx.moveTo(x,yy);});
 ctx.stroke();
 document.getElementById('stRead').innerHTML='閉迴路極點：s = '+re1.toFixed(2)+(im1?'±j'+Math.abs(im1).toFixed(2):'')+(disc>=0&&re1!==re2?(', '+re2.toFixed(2)):'')+'　　狀態從 x1(0)=1 出發，曲線是回授把它拉回 0 的過程（調節問題）。'+(disc<0?' 共軛複數極點：帶振盪地收斂。':' 實極點：不振盪收斂。');
}

buildSidebar();renderHome();
</script>
